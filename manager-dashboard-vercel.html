<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manager Dashboard - Phase 4</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #3b82f6;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --dark-bg: #0f172a;
            --card-bg: #1e293b;
            --border: #334155;
            --text-primary: #f1f5f9;
            --text-secondary: #cbd5e1;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--dark-bg);
            color: var(--text-primary);
        }

        nav {
            background: var(--card-bg);
            border-bottom: 1px solid var(--border);
            padding: 15px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        nav .logo {
            font-size: 18px;
            font-weight: bold;
            color: var(--primary);
        }

        nav .nav-links {
            display: flex;
            gap: 20px;
            list-style: none;
        }

        nav .nav-links li {
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            color: var(--text-secondary);
        }

        nav .logout-btn {
            background: var(--danger);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 0 20px;
        }

        .dashboard-header {
            margin-bottom: 30px;
        }

        .dashboard-title {
            font-size: 28px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 20px;
        }

        .metrics {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .metric-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 15px;
        }

        .metric-label {
            font-size: 12px;
            color: var(--text-secondary);
            text-transform: uppercase;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .metric-value {
            font-size: 24px;
            font-weight: 700;
            color: var(--text-primary);
        }

        .tabs {
            display: flex;
            gap: 0;
            margin-bottom: 30px;
            border-bottom: 1px solid var(--border);
        }

        .tab {
            padding: 12px 20px;
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            position: relative;
            transition: color 0.2s;
        }

        .tab:hover {
            color: var(--text-primary);
        }

        .tab.active {
            color: var(--primary);
        }

        .tab.active::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 0;
            right: 0;
            height: 2px;
            background: var(--primary);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .batch-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 15px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .batch-card:hover {
            border-color: var(--primary);
            background: rgba(59, 130, 246, 0.05);
        }

        .batch-card.approved {
            opacity: 0.75;
        }

        .batch-card.rejected {
            opacity: 0.75;
        }

        .batch-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
        }

        .batch-title-block {
            flex: 1;
        }

        .batch-title {
            font-weight: 600;
            font-size: 16px;
            color: var(--text-primary);
        }

        .batch-id {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        .batch-status {
            display: inline-block;
            padding: 5px 12px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
        }

        .status-pending {
            background: rgba(245, 158, 11, 0.2);
            color: #fbbf24;
        }

        .status-approved {
            background: rgba(16, 185, 129, 0.2);
            color: #6ee7b7;
        }

        .status-rejected {
            background: rgba(239, 68, 68, 0.2);
            color: #fca5a5;
        }

        .batch-details {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 16px;
            margin-bottom: 12px;
            padding: 12px 0;
            border-top: 1px solid var(--border);
            border-bottom: 1px solid var(--border);
        }

        .detail-label {
            font-size: 11px;
            color: var(--text-secondary);
            text-transform: uppercase;
            margin-bottom: 4px;
            font-weight: 600;
        }

        .detail-value {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .batch-actions {
            display: flex;
            gap: 10px;
            margin-top: 12px;
        }

        .btn-approve, .btn-reject {
            padding: 8px 16px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
            background: var(--card-bg);
            color: var(--text-primary);
        }

        .btn-approve {
            border-color: var(--success);
            color: #6ee7b7;
        }

        .btn-approve:hover:not(:disabled) {
            background: rgba(16, 185, 129, 0.1);
        }

        .btn-reject {
            border-color: var(--danger);
            color: #fca5a5;
        }

        .btn-reject:hover:not(:disabled) {
            background: rgba(239, 68, 68, 0.1);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .detail-modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .detail-modal-overlay.show {
            display: flex;
        }

        .detail-modal {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 30px;
            max-width: 700px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            position: relative;
        }

        .modal-close {
            position: absolute;
            top: 20px;
            right: 20px;
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 28px;
            cursor: pointer;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-close:hover {
            color: var(--text-primary);
        }

        .modal-header {
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--border);
            margin-right: 30px;
        }

        .modal-title {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .modal-info {
            font-size: 13px;
            color: var(--text-secondary);
        }

        .claims-list {
            margin-bottom: 20px;
        }

        .claim-item {
            background: rgba(59, 130, 246, 0.05);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 15px;
            margin-bottom: 12px;
        }

        .claim-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
        }

        .claim-vendor {
            font-weight: 600;
            color: var(--text-primary);
            font-size: 14px;
        }

        .claim-amount {
            font-size: 14px;
            font-weight: 600;
            color: #6ee7b7;
        }

        .claim-info {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 12px;
        }

        .claim-info-label {
            font-size: 11px;
            color: var(--text-secondary);
            text-transform: uppercase;
            margin-bottom: 4px;
            font-weight: 600;
        }

        .claim-info-value {
            font-size: 13px;
            color: var(--text-primary);
        }

        .claim-attachment {
            background: var(--dark-bg);
            border: 1px dashed var(--border);
            border-radius: 6px;
            padding: 8px 12px;
            font-size: 12px;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .claim-attachment.has-doc {
            border-style: solid;
            color: var(--primary);
            cursor: pointer;
        }

        .claim-attachment.has-doc:hover {
            background: rgba(59, 130, 246, 0.1);
        }

        .modal-actions {
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-secondary);
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 15px;
            opacity: 0.5;
        }
    </style>
</head>
<body>
    <nav>
        <div class="logo">🎯 Personal Claims App</div>
        <ul class="nav-links">
            <li>EMPLOYEE</li>
            <li>MANAGER</li>
            <li>FINANCE</li>
            <li>RECONCILIATION</li>
            <li>HR</li>
            <li>ADMIN</li>
            <li style="cursor: default;">Manager (Guest)</li>
        </ul>
        <button class="logout-btn" onclick="logout()">LOGOUT</button>
    </nav>

    <div class="container">
        <div class="dashboard-header">
            <h1 class="dashboard-title">🎁 Manager Dashboard - Phase 4: Batch Approval</h1>
        </div>

        <div class="metrics">
            <div class="metric-card">
                <div class="metric-label">Pending Approval</div>
                <div class="metric-value" id="pendingCount">0</div>
            </div>
            <div class="metric-card">
                <div class="metric-label">Total Pending</div>
                <div class="metric-value" id="pendingTotal">R 0.00</div>
            </div>
            <div class="metric-card">
                <div class="metric-label">Approved</div>
                <div class="metric-value" id="approvedCount">0</div>
            </div>
            <div class="metric-card">
                <div class="metric-label">Approved Amount</div>
                <div class="metric-value" id="approvedTotal">R 0.00</div>
            </div>
        </div>

        <div class="tabs">
            <button class="tab active" onclick="switchTab('pending')">PENDING APPROVAL</button>
            <button class="tab" onclick="switchTab('approved')">APPROVED</button>
            <button class="tab" onclick="switchTab('rejected')">REJECTED</button>
        </div>

        <div id="pending" class="tab-content active">
            <div id="pendingContainer"></div>
        </div>

        <div id="approved" class="tab-content">
            <div id="approvedContainer"></div>
        </div>

        <div id="rejected" class="tab-content">
            <div id="rejectedContainer"></div>
        </div>
    </div>

    <div id="detailModal" class="detail-modal-overlay">
        <div class="detail-modal">
            <button class="modal-close" onclick="closeDetails()">&times;</button>
            
            <div class="modal-header">
                <div class="modal-title" id="modalTitle">Batch Details</div>
                <div class="modal-info" id="modalInfo"></div>
            </div>
            
            <div class="claims-list" id="modalClaimsList"></div>
            
            <div class="modal-actions">
                <button class="btn-approve" id="modalApproveBtn" onclick="approveCurrentBatch()" style="padding: 10px 20px; cursor: pointer;">Approve Batch</button>
                <button class="btn-reject" id="modalRejectBtn" onclick="rejectCurrentBatch()" style="padding: 10px 20px; cursor: pointer;">Reject Batch</button>
            </div>
        </div>
    </div>

    <script>
        // VERCEL BACKEND URL - Change this to your Vercel project URL
        const VERCEL_URL = 'https://your-vercel-project.vercel.app';
        
        let allBatches = [];
        let currentBatchData = null;

        async function init() {
            await loadDashboard();
        }

        async function loadDashboard() {
            try {
                const response = await fetch(`${VERCEL_URL}/api/batches`);

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }

                const batches = await response.json();
                allBatches = Array.isArray(batches) ? batches : [];
                
                renderAllTabs();
                updateStats();
            } catch (err) {
                console.error('Error loading batches:', err);
                showError('Error loading batches: ' + err.message);
            }
        }

        function renderAllTabs() {
            const pending = allBatches.filter(b => b.status === 'pending');
            const approved = allBatches.filter(b => b.status === 'approved');
            const rejected = allBatches.filter(b => b.status === 'rejected');

            renderBatches(pending, 'pendingContainer');
            renderBatches(approved, 'approvedContainer', 'approved');
            renderBatches(rejected, 'rejectedContainer', 'rejected');
        }

        function renderBatches(batches, containerId, statusClass = '') {
            const container = document.getElementById(containerId);
            
            if (batches.length === 0) {
                container.innerHTML = '<div class="empty-state"><div class="empty-state-icon">📭</div><p>No batches</p></div>';
                return;
            }

            container.innerHTML = batches.map(batch => `
                <div class="batch-card ${statusClass}" onclick="showDetails(${JSON.stringify(batch).replace(/"/g, '&quot;')})">
                    <div class="batch-header">
                        <div class="batch-title-block">
                            <div class="batch-title">Batch #${batch.id} - Employee ${batch.employee_id}</div>
                            <div class="batch-id">Profit Center: ${batch.profit_center || 'N/A'}</div>
                        </div>
                        <span class="batch-status status-${batch.status}">${batch.status.toUpperCase()}</span>
                    </div>
                    
                    <div class="batch-details">
                        <div class="detail-item">
                            <div class="detail-label">Total Amount</div>
                            <div class="detail-value">R ${(batch.total_amount || 0).toFixed(2)}</div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label">Claims Count</div>
                            <div class="detail-value">${(batch.transaction_ids || []).length}</div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label">Created Date</div>
                            <div class="detail-value">${batch.created_date ? batch.created_date.split('T')[0] : 'N/A'}</div>
                        </div>
                    </div>
                    
                    <div class="batch-actions">
                        <button class="btn-approve" ${batch.status !== 'pending' ? 'disabled' : ''} onclick="event.stopPropagation(); approveCurrentBatch()">Approve Batch</button>
                        <button class="btn-reject" ${batch.status !== 'pending' ? 'disabled' : ''} onclick="event.stopPropagation(); rejectCurrentBatch()">Reject Batch</button>
                    </div>
                </div>
            `).join('');
        }

        async function showDetails(batch) {
            currentBatchData = batch;
            
            document.getElementById('modalTitle').textContent = `Batch #${batch.id} - Employee ${batch.employee_id}`;
            document.getElementById('modalInfo').textContent = `Profit Center: ${batch.profit_center} | Total: R ${(batch.total_amount || 0).toFixed(2)} | Created: ${batch.created_date ? batch.created_date.split('T')[0] : 'N/A'}`;
            
            const approveBtn = document.getElementById('modalApproveBtn');
            const rejectBtn = document.getElementById('modalRejectBtn');
            if (batch.status !== 'pending') {
                approveBtn.disabled = true;
                rejectBtn.disabled = true;
            } else {
                approveBtn.disabled = false;
                rejectBtn.disabled = false;
            }

            await loadTransactionDetails(batch);
            document.getElementById('detailModal').classList.add('show');
        }

        async function loadTransactionDetails(batch) {
            try {
                if (!batch.transaction_ids || batch.transaction_ids.length === 0) {
                    document.getElementById('modalClaimsList').innerHTML = '<div class="empty-state">No claims in this batch</div>';
                    return;
                }

                const response = await fetch(`${VERCEL_URL}/api/transactions?ids=${batch.transaction_ids.join(',')}`);

                if (!response.ok) {
                    throw new Error('Failed to fetch transaction details');
                }

                const transactions = await response.json();
                renderTransactionDetails(transactions);
            } catch (err) {
                console.error('Error loading transactions:', err);
                document.getElementById('modalClaimsList').innerHTML = '<div class="empty-state">Error loading claims details</div>';
            }
        }

        function renderTransactionDetails(transactions) {
            const claimsList = document.getElementById('modalClaimsList');
            
            if (transactions.length === 0) {
                claimsList.innerHTML = '<div class="empty-state">No claims found</div>';
                return;
            }

            claimsList.innerHTML = transactions.map(tx => `
                <div class="claim-item">
                    <div class="claim-header">
                        <div class="claim-vendor">${tx.vendor || 'Unknown Vendor'}</div>
                        <div class="claim-amount">R ${(tx.amount || 0).toFixed(2)}</div>
                    </div>
                    <div class="claim-info">
                        <div>
                            <div class="claim-info-label">Claim Date</div>
                            <div class="claim-info-value">${tx.claim_date ? tx.claim_date.split('T')[0] : 'N/A'}</div>
                        </div>
                        <div>
                            <div class="claim-info-label">Category</div>
                            <div class="claim-info-value">${tx.category || 'N/A'}</div>
                        </div>
                    </div>
                    <div class="claim-attachment ${tx.attachment_url ? 'has-doc' : ''}">
                        ${tx.attachment_url ? `📎 <strong>${tx.attachment_url.split('/').pop()}</strong> (click to view)` : '📄 No supporting document attached'}
                    </div>
                </div>
            `).join('');
        }

        function closeDetails() {
            document.getElementById('detailModal').classList.remove('show');
            currentBatchData = null;
        }

        async function approveCurrentBatch() {
            if (!currentBatchData) return;
            
            try {
                const response = await fetch(`${VERCEL_URL}/api/batches`, {
                    method: 'PATCH',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        batchId: currentBatchData.id,
                        status: 'approved'
                    })
                });

                if (!response.ok) {
                    throw new Error('Failed to approve batch');
                }

                alert('Batch approved successfully!');
                closeDetails();
                await loadDashboard();
            } catch (err) {
                alert('Error approving batch: ' + err.message);
            }
        }

        async function rejectCurrentBatch() {
            if (!currentBatchData) return;
            
            const reason = prompt('Enter rejection reason:');
            if (!reason) return;

            try {
                const response = await fetch(`${VERCEL_URL}/api/batches`, {
                    method: 'PATCH',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        batchId: currentBatchData.id,
                        status: 'rejected'
                    })
                });

                if (!response.ok) {
                    throw new Error('Failed to reject batch');
                }

                alert('Batch rejected!');
                closeDetails();
                await loadDashboard();
            } catch (err) {
                alert('Error rejecting batch: ' + err.message);
            }
        }

        function updateStats() {
            const pending = allBatches.filter(b => b.status === 'pending');
            const approved = allBatches.filter(b => b.status === 'approved');

            const pendingTotal = pending.reduce((sum, b) => sum + (b.total_amount || 0), 0);
            const approvedTotal = approved.reduce((sum, b) => sum + (b.total_amount || 0), 0);

            document.getElementById('pendingCount').textContent = pending.length;
            document.getElementById('pendingTotal').textContent = `R ${pendingTotal.toFixed(2)}`;
            document.getElementById('approvedCount').textContent = approved.length;
            document.getElementById('approvedTotal').textContent = `R ${approvedTotal.toFixed(2)}`;
        }

        function switchTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(tab => {
                tab.classList.remove('active');
            });
            document.querySelectorAll('.tab').forEach(tab => {
                tab.classList.remove('active');
            });
            
            document.getElementById(tabName).classList.add('active');
            event.target.classList.add('active');
        }

        function showError(message) {
            const pending = document.getElementById('pendingContainer');
            pending.innerHTML = `<div class="empty-state"><p>${message}</p></div>`;
        }

        function logout() {
            localStorage.removeItem('supabaseSession');
            window.location.href = 'employee-dashboard-phase2.html';
        }

        window.addEventListener('load', init);
    </script>
</body>
</html>
