<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manager Dashboard - Phase 4</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #3b82f6;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --dark-bg: #0f172a;
            --card-bg: #1e293b;
            --border: #334155;
            --text-primary: #f1f5f9;
            --text-secondary: #cbd5e1;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--dark-bg);
            color: var(--text-primary);
        }

        /* Navigation */
        nav {
            background: var(--card-bg);
            border-bottom: 1px solid var(--border);
            padding: 15px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        nav .logo {
            font-size: 18px;
            font-weight: bold;
            color: var(--primary);
        }

        nav .nav-links {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        nav a {
            color: var(--text-secondary);
            text-decoration: none;
            padding: 8px 16px;
            transition: all 0.3s;
        }

        nav a.active {
            color: var(--primary);
            font-weight: 600;
        }

        nav a:hover {
            color: var(--text-primary);
        }

        nav .user-info {
            padding: 8px 16px;
            background: var(--border);
            border-radius: 6px;
            font-size: 14px;
        }

        .logout-btn {
            background: var(--danger);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
        }

        .logout-btn:hover {
            opacity: 0.9;
        }

        /* Container */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* Header */
        h1 {
            font-size: 32px;
            margin-bottom: 30px;
            color: var(--primary);
        }

        /* Stats Grid */
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            padding: 20px;
            border-radius: 12px;
            text-align: center;
        }

        .stat-label {
            color: var(--text-secondary);
            font-size: 13px;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .stat-value {
            font-size: 32px;
            font-weight: bold;
            color: var(--primary);
        }

        /* Batch Section */
        .section-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 20px;
            color: var(--text-primary);
        }

        .batch-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 20px;
        }

        .batch-header {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1fr 1fr auto;
            gap: 15px;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border);
        }

        .batch-info {
            display: flex;
            flex-direction: column;
        }

        .batch-label {
            font-size: 12px;
            color: var(--text-secondary);
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .batch-value {
            font-size: 16px;
            font-weight: 600;
        }

        .batch-amount {
            color: var(--success);
            font-size: 20px;
        }

        .batch-status {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .status-pending {
            background: rgba(245, 158, 11, 0.2);
            color: var(--warning);
        }

        .status-approved {
            background: rgba(16, 185, 129, 0.2);
            color: var(--success);
        }

        /* Actions */
        .batch-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-bottom: 15px;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-approve {
            background: var(--success);
            color: white;
        }

        .btn-approve:hover {
            opacity: 0.9;
        }

        .btn-reject {
            background: var(--danger);
            color: white;
        }

        .btn-reject:hover {
            opacity: 0.9;
        }

        /* Transactions Toggle */
        .tx-toggle {
            padding: 15px;
            background: rgba(59, 130, 246, 0.1);
            border: 1px solid var(--border);
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .tx-toggle:hover {
            background: rgba(59, 130, 246, 0.15);
        }

        .toggle-label {
            font-weight: 600;
            color: var(--primary);
        }

        .toggle-icon {
            transition: transform 0.3s;
        }

        .toggle-icon.rotated {
            transform: rotate(180deg);
        }

        /* Transactions List */
        .tx-list {
            display: none;
            margin-top: 15px;
        }

        .tx-list.show {
            display: block;
        }

        .tx-item {
            background: rgba(30, 41, 59, 0.5);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 10px;
            display: grid;
            grid-template-columns: 2fr 1fr 1fr 1fr 1fr auto;
            gap: 15px;
            align-items: center;
        }

        .tx-vendor {
            font-weight: 600;
        }

        .tx-category {
            background: var(--border);
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
        }

        .tx-amount {
            color: var(--success);
            font-weight: 600;
        }

        .tx-date {
            color: var(--text-secondary);
            font-size: 14px;
        }

        .btn-view {
            background: var(--primary);
            color: white;
            padding: 6px 12px;
            font-size: 12px;
        }

        .btn-view:hover {
            background: #2563eb;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(4px);
        }

        .modal.active {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 30px;
            max-width: 600px;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--border);
        }

        .modal-title {
            font-size: 20px;
            font-weight: 600;
        }

        .modal-close {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 24px;
            cursor: pointer;
        }

        .modal-close:hover {
            color: var(--text-primary);
        }

        .detail-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .detail-item {
            display: flex;
            flex-direction: column;
        }

        .detail-label {
            font-size: 12px;
            color: var(--text-secondary);
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .detail-value {
            font-size: 16px;
            font-weight: 600;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 40px;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text-secondary);
        }

        /* Loading */
        .loading {
            text-align: center;
            padding: 40px;
            color: var(--text-secondary);
        }

        .spinner {
            border: 3px solid var(--border);
            border-top: 3px solid var(--primary);
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @media (max-width: 1024px) {
            .batch-header {
                grid-template-columns: 1fr 1fr;
            }

            .tx-item {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 768px) {
            .stats {
                grid-template-columns: 1fr;
            }

            nav {
                flex-direction: column;
                gap: 15px;
                align-items: flex-start;
            }

            nav .nav-links {
                flex-wrap: wrap;
            }
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav>
        <div class="logo">🏢 Personal Claims App</div>
        <div class="nav-links">
            <a href="employee-dashboard-phase2.html">EMPLOYEE</a>
            <a href="#" class="active">MANAGER</a>
            <a href="finance-dashboard-phase5.html">FINANCE</a>
            <a href="reconciliation-dashboard-phase6.html">RECONCILIATION</a>
            <a href="hr-dashboard-phase1.html">HR</a>
            <a href="admin-dashboard.html">ADMIN</a>
            <div class="user-info" id="userDisplay">Loading...</div>
            <button class="logout-btn" onclick="logout()">LOGOUT</button>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container">
        <h1>👨‍💼 Manager Dashboard - Phase 4: Batch Approval</h1>

        <!-- Stats -->
        <div class="stats">
            <div class="stat-card">
                <div class="stat-label">Pending Approval</div>
                <div class="stat-value" id="pendingCount">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Total Pending</div>
                <div class="stat-value" id="pendingAmount">R 0.00</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Approved</div>
                <div class="stat-value" id="approvedCount">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Approved Amount</div>
                <div class="stat-value" id="approvedAmount">R 0.00</div>
            </div>
        </div>

        <!-- Pending Batches -->
        <div style="margin-bottom: 50px;">
            <div class="section-title">📋 Pending Batches</div>
            <div id="pendingContainer">
                <div class="loading"><div class="spinner"></div>Loading...</div>
            </div>
        </div>

        <!-- Approved Batches -->
        <div>
            <div class="section-title">✅ Approved Batches</div>
            <div id="approvedContainer">
                <div class="empty-state">No approved batches yet</div>
            </div>
        </div>
    </div>

    <!-- Modal -->
    <div id="txModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title">Transaction Details</div>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div id="modalBody"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0"></script>
    <script>
        const SUPABASE_URL = 'https://wxjchdcohsuhyeokzmtd.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind4amNoZGNvaHN1aHllb2t6bXRkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEwODUwMTMsImV4cCI6MjA5NjY2NTAxM30.ZgCfVEfMEpOW7TJRzJ6VyBLWHYm8DBdpP7pBxYCvFWY';

        let supabase;
        let currentUser = null;

        async function init() {
            const { createClient } = window.supabase;
            supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

            const session = JSON.parse(localStorage.getItem('supabaseSession'));
            if (session && session.user) {
                currentUser = session.user;
                document.getElementById('userDisplay').textContent = `${currentUser.user_metadata?.name || 'Manager'} ${currentUser.user_metadata?.surname || 'User'}`;
            } else {
                document.getElementById('userDisplay').textContent = 'Manager (Guest)';
            }
            loadDashboard();
        }

        async function loadDashboard() {
            try {
                const { data: batches } = await supabase
                    .from('batches')
                    .select('*')
                    .order('created_date', { ascending: false });

                renderBatches(batches || []);
            } catch (err) {
                console.error('Error:', err);
                document.getElementById('pendingContainer').innerHTML = `<div class="empty-state">Error loading batches</div>`;
            }
        }

        function renderBatches(batches) {
            const pending = batches.filter(b => b.status === 'pending');
            const approved = batches.filter(b => b.status === 'approved');

            // Pending
            if (pending.length === 0) {
                document.getElementById('pendingContainer').innerHTML = '<div class="empty-state">No pending batches</div>';
            } else {
                document.getElementById('pendingContainer').innerHTML = pending.map(b => renderBatch(b)).join('');
            }

            // Approved
            if (approved.length === 0) {
                document.getElementById('approvedContainer').innerHTML = '<div class="empty-state">No approved batches yet</div>';
            } else {
                document.getElementById('approvedContainer').innerHTML = approved.map(b => renderBatch(b)).join('');
            }

            updateStats(batches);
            attachEventListeners();
        }

        function renderBatch(batch) {
            const amount = parseFloat(batch.total_amount).toLocaleString('en-ZA', { style: 'currency', currency: 'ZAR' });
            const txCount = batch.transaction_ids?.length || 0;
            const statusClass = `status-${batch.status}`;
            const buttons = batch.status === 'pending' ? `
                <button class="btn-approve" onclick="approveBatch(${batch.id})">✓ APPROVE</button>
                <button class="btn-reject" onclick="rejectBatch(${batch.id})">✗ REJECT</button>
            ` : '';

            return `
                <div class="batch-card">
                    <div class="batch-header">
                        <div class="batch-info">
                            <div class="batch-label">Batch ID</div>
                            <div class="batch-value">#${batch.id}</div>
                        </div>
                        <div class="batch-info">
                            <div class="batch-label">Employee</div>
                            <div class="batch-value emp-name-${batch.id}">Loading...</div>
                        </div>
                        <div class="batch-info">
                            <div class="batch-label">Profit Center</div>
                            <div class="batch-value">${batch.profit_center}</div>
                        </div>
                        <div class="batch-info">
                            <div class="batch-label">Transactions</div>
                            <div class="batch-value">${txCount}</div>
                        </div>
                        <div class="batch-info">
                            <div class="batch-label">Amount</div>
                            <div class="batch-amount">${amount}</div>
                        </div>
                        <div class="batch-info">
                            <div class="batch-label">Status</div>
                            <span class="batch-status ${statusClass}">${batch.status}</span>
                        </div>
                    </div>

                    <div class="batch-actions">
                        ${buttons}
                    </div>

                    <div class="tx-toggle" onclick="toggleTransactions(${batch.id})">
                        <span class="toggle-label">
                            <span class="toggle-icon">▼</span>
                            View Transactions (${txCount})
                        </span>
                    </div>

                    <div class="tx-list" id="txlist-${batch.id}">
                        <div class="loading"><div class="spinner"></div>Loading...</div>
                    </div>
                </div>
            `;
        }

        async function toggleTransactions(batchId) {
            const list = document.getElementById(`txlist-${batchId}`);
            const icon = document.querySelector(`#txlist-${batchId}`).previousElementSibling.querySelector('.toggle-icon');
            
            if (list.classList.contains('show')) {
                list.classList.remove('show');
                icon.classList.remove('rotated');
            } else {
                list.classList.add('show');
                icon.classList.add('rotated');
                await loadTransactions(batchId);
            }
        }

        async function loadTransactions(batchId) {
            try {
                const { data: batch } = await supabase
                    .from('batches')
                    .select('transaction_ids')
                    .eq('id', batchId)
                    .single();

                if (!batch || !batch.transaction_ids) return;

                const { data: txs } = await supabase
                    .from('transactions')
                    .select('*')
                    .in('id', batch.transaction_ids);

                const html = (txs || []).map(tx => `
                    <div class="tx-item">
                        <div class="tx-vendor">${tx.vendor}</div>
                        <div class="tx-category">${tx.category}</div>
                        <div class="tx-amount">R ${parseFloat(tx.amount).toFixed(2)}</div>
                        <div class="tx-date">${new Date(tx.claim_date).toLocaleDateString('en-ZA')}</div>
                        <div></div>
                        <button class="btn-view" onclick="viewTransaction(${tx.id})">Details</button>
                    </div>
                `).join('');

                document.getElementById(`txlist-${batchId}`).innerHTML = html || '<div class="empty-state">No transactions</div>';
            } catch (err) {
                console.error('Error loading transactions:', err);
            }
        }

        async function viewTransaction(txId) {
            try {
                const { data: tx } = await supabase
                    .from('transactions')
                    .select('*')
                    .eq('id', txId)
                    .single();

                if (!tx) return;

                const date = new Date(tx.claim_date).toLocaleDateString('en-ZA');
                const amount = parseFloat(tx.amount).toLocaleString('en-ZA', { style: 'currency', currency: 'ZAR' });

                document.getElementById('modalBody').innerHTML = `
                    <div class="detail-grid">
                        <div class="detail-item">
                            <div class="detail-label">Vendor</div>
                            <div class="detail-value">${tx.vendor}</div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label">Amount</div>
                            <div class="detail-value">${amount}</div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label">Category</div>
                            <div class="detail-value">${tx.category}</div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label">Date</div>
                            <div class="detail-value">${date}</div>
                        </div>
                    </div>
                    ${tx.notes ? `<div style="margin-bottom: 20px;"><div class="detail-label">Notes</div><div class="detail-value">${tx.notes}</div></div>` : ''}
                `;

                document.getElementById('txModal').classList.add('active');
            } catch (err) {
                console.error('Error:', err);
            }
        }

        function closeModal() {
            document.getElementById('txModal').classList.remove('active');
        }

        async function approveBatch(batchId) {
            if (!confirm('Approve this batch?')) return;
            try {
                await supabase.from('batches').update({ status: 'approved' }).eq('id', batchId);
                loadDashboard();
            } catch (err) {
                alert('Error: ' + err.message);
            }
        }

        async function rejectBatch(batchId) {
            if (!confirm('Reject this batch?')) return;
            try {
                await supabase.from('batches').update({ status: 'rejected' }).eq('id', batchId);
                loadDashboard();
            } catch (err) {
                alert('Error: ' + err.message);
            }
        }

        async function updateStats(batches) {
            const pending = batches.filter(b => b.status === 'pending');
            const approved = batches.filter(b => b.status === 'approved');

            const pendingAmt = pending.reduce((sum, b) => sum + parseFloat(b.total_amount || 0), 0);
            const approvedAmt = approved.reduce((sum, b) => sum + parseFloat(b.total_amount || 0), 0);

            document.getElementById('pendingCount').textContent = pending.length;
            document.getElementById('pendingAmount').textContent = pendingAmt.toLocaleString('en-ZA', { style: 'currency', currency: 'ZAR' });
            document.getElementById('approvedCount').textContent = approved.length;
            document.getElementById('approvedAmount').textContent = approvedAmt.toLocaleString('en-ZA', { style: 'currency', currency: 'ZAR' });

            // Load employee names
            batches.forEach(async b => {
                const { data: emp } = await supabase.from('users').select('name, surname').eq('id', b.employee_id).single();
                if (emp) {
                    const elem = document.querySelector(`.emp-name-${b.id}`);
                    if (elem) elem.textContent = `${emp.name} ${emp.surname}`;
                }
            });
        }

        function attachEventListeners() {
            // Already attached in onclick attributes
        }

        function logout() {
            localStorage.removeItem('supabaseSession');
            window.location.href = 'index.html';
        }

        // Initialize
        init();
    </script>
</body>
</html>
