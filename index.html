<!DOCTYPE html>
<html>
<head>
    <title>Personal Claims App - Manager Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background-color: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }
        
        h1 {
            font-size: 24px;
            color: #333;
        }
        
        .logout-btn {
            background-color: #6c757d;
            color: white;
            padding: 8px 16px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 600;
        }
        
        .logout-btn:hover {
            background-color: #5a6268;
        }
        
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            border-bottom: 2px solid #eee;
        }
        
        .tab-btn {
            padding: 12px 20px;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            color: #999;
            border-bottom: 3px solid transparent;
            transition: all 0.3s;
        }
        
        .tab-btn.active {
            color: #667eea;
            border-bottom-color: #667eea;
        }
        
        .message {
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            display: none;
        }
        
        .message.show {
            display: block;
        }
        
        .message.success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .message.error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        .batch-card {
            background-color: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            border-left: 4px solid #667eea;
        }
        
        .batch-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        
        .batch-title {
            font-size: 18px;
            font-weight: 600;
            color: #333;
        }
        
        .batch-amount {
            font-size: 18px;
            font-weight: 600;
            color: #667eea;
        }
        
        .batch-details {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 15px;
            margin-bottom: 15px;
            font-size: 14px;
            color: #666;
        }
        
        .transactions-list {
            background-color: white;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 15px;
        }
        
        .transaction-item {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1fr;
            gap: 15px;
            padding: 10px;
            border-bottom: 1px solid #eee;
            font-size: 13px;
        }
        
        .transaction-item:last-child {
            border-bottom: none;
        }
        
        .actions {
            display: flex;
            gap: 10px;
        }
        
        button {
            padding: 10px 16px;
            border: none;
            border-radius: 5px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        
        .btn-approve {
            background-color: #28a745;
            color: white;
        }
        
        .btn-approve:hover {
            background-color: #218838;
        }
        
        .btn-reject {
            background-color: #dc3545;
            color: white;
        }
        
        .btn-reject:hover {
            background-color: #c82333;
        }
        
        .remarks-input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            margin-top: 10px;
            font-family: Arial;
            font-size: 14px;
        }
        
        .tab-content {
            display: none;
        }
        
        .tab-content.active {
            display: block;
        }
        
        .empty {
            text-align: center;
            padding: 40px;
            color: #999;
        }
        
        .status-badge {
            padding: 4px 10px;
            border-radius: 15px;
            font-size: 12px;
            font-weight: 600;
        }
        
        .status-pending {
            background-color: #fff3cd;
            color: #856404;
        }
        
        .status-approved {
            background-color: #d4edda;
            color: #155724;
        }
        
        .status-rejected {
            background-color: #f8d7da;
            color: #721c24;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>👨‍💼 Manager Approval Dashboard</h1>
        <button class="logout-btn" onclick="logout()">Logout</button>
    </div>
    
    <div id="message" class="message"></div>
    
    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('pending')">Awaiting Approval</button>
        <button class="tab-btn" onclick="switchTab('approved')">Approved</button>
        <button class="tab-btn" onclick="switchTab('rejected')">Rejected</button>
    </div>
    
    <!-- AWAITING APPROVAL -->
    <div id="pendingTab" class="tab-content active">
        <div id="pendingList"></div>
    </div>
    
    <!-- APPROVED -->
    <div id="approvedTab" class="tab-content">
        <div id="approvedList"></div>
    </div>
    
    <!-- REJECTED -->
    <div id="rejectedTab" class="tab-content">
        <div id="rejectedList"></div>
    </div>
</div>

<script>
    const SUPABASE_URL = "https://wxjchdcohsuhyeokzmtd.supabase.co";
    const SUPABASE_KEY = "sb_publishable_IY6JOZpXAkLlHG0uUAfbeg_7roRDcEg";
    
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    
    let currentTab = 'pending';
    
    window.addEventListener('load', function() {
        loadBatches('pending');
    });
    
    function switchTab(tab) {
        currentTab = tab;
        
        // Update buttons
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.classList.remove('active');
        });
        event.target.classList.add('active');
        
        // Hide all tabs
        document.getElementById('pendingTab').classList.remove('active');
        document.getElementById('approvedTab').classList.remove('active');
        document.getElementById('rejectedTab').classList.remove('active');
        
        // Show selected tab
        document.getElementById(tab + 'Tab').classList.add('active');
        
        loadBatches(tab);
    }
    
    async function loadBatches(status) {
        const listElement = document.getElementById(status + 'List');
        listElement.innerHTML = '<div class="empty">Loading...</div>';
        
        try {
            const { data, error } = await supabaseClient
                .from('batches')
                .select('*')
                .eq('status', status)
                .order('created_date', { ascending: false });
            
            if (error) {
                listElement.innerHTML = '<div class="empty">Error loading batches</div>';
                return;
            }
            
            if (data.length === 0) {
                listElement.innerHTML = '<div class="empty">No ' + status + ' batches</div>';
                return;
            }
            
            let html = '';
            data.forEach(batch => {
                const txCount = batch.transaction_ids ? batch.transaction_ids.length : 0;
                
                html += `
                    <div class="batch-card">
                        <div class="batch-header">
                            <div>
                                <div class="batch-title">Batch #${batch.id}</div>
                                <div style="font-size: 12px; color: #999; margin-top: 5px;">Employee ${batch.employee_id} • ${batch.profit_center}</div>
                            </div>
                            <div class="batch-amount">R${batch.total_amount}</div>
                        </div>
                        
                        <div class="batch-details">
                            <div><strong>Transactions:</strong> ${txCount}</div>
                            <div><strong>Created:</strong> ${new Date(batch.created_date).toLocaleDateString()}</div>
                            <div><strong>Status:</strong> <span class="status-badge status-${status}">${status.toUpperCase()}</span></div>
                        </div>
                        
                        <div class="transactions-list">
                            <strong style="font-size: 12px; color: #666;">Transactions in this batch:</strong>
                            <div class="transaction-item" style="border: none; padding: 5px 0; margin-top: 8px;">
                                <strong style="font-size: 12px;">Category</strong>
                                <strong style="font-size: 12px;">Amount</strong>
                                <strong style="font-size: 12px;">Date</strong>
                                <strong style="font-size: 12px;">Vendor</strong>
                            </div>
                            ${getTransactionItems(batch.transaction_ids || [])}
                        </div>
                        
                        ${status === 'pending' ? `
                            <div class="actions">
                                <button class="btn-approve" onclick="approveBatch(${batch.id})">✓ Approve</button>
                                <button class="btn-reject" onclick="showRejectForm(${batch.id})">✗ Reject</button>
                            </div>
                            <textarea class="remarks-input" id="remarks-${batch.id}" placeholder="Add rejection remarks (required)..." style="display:none;"></textarea>
                            <div id="reject-actions-${batch.id}" style="display:none; margin-top: 10px;">
                                <button class="btn-approve" onclick="confirmReject(${batch.id})">Confirm Reject</button>
                                <button style="background-color: #6c757d; color: white;" onclick="cancelReject(${batch.id})">Cancel</button>
                            </div>
                        ` : ''}
                    </div>
                `;
            });
            
            listElement.innerHTML = html;
        } catch (err) {
            listElement.innerHTML = '<div class="empty">Error: ' + err.message + '</div>';
        }
    }
    
    async function getTransactionItems(txIds) {
        if (!txIds || txIds.length === 0) return '<div class="empty" style="padding: 10px;">No transactions</div>';
        
        try {
            const { data } = await supabaseClient
                .from('transactions')
                .select('*')
                .in('id', txIds);
            
            if (!data || data.length === 0) return '';
            
            let html = '';
            data.forEach(tx => {
                html += `
                    <div class="transaction-item">
                        <div>${tx.category}</div>
                        <div>R${tx.amount}</div>
                        <div>${tx.claim_date}</div>
                        <div>${tx.vendor || 'N/A'}</div>
                    </div>
                `;
            });
            return html;
        } catch (err) {
            return '';
        }
    }
    
    function showRejectForm(batchId) {
        document.getElementById('remarks-' + batchId).style.display = 'block';
        document.getElementById('reject-actions-' + batchId).style.display = 'block';
    }
    
    function cancelReject(batchId) {
        document.getElementById('remarks-' + batchId).style.display = 'none';
        document.getElementById('reject-actions-' + batchId).style.display = 'none';
    }
    
    async function approveBatch(batchId) {
        try {
            const { error } = await supabaseClient
                .from('batches')
                .update({ status: 'approved' })
                .eq('id', batchId);
            
            if (error) {
                showMsg('Error: ' + error.message, 'error');
                return;
            }
            
            showMsg('✓ Batch approved!', 'success');
            loadBatches('pending');
            loadBatches('approved');
        } catch (err) {
            showMsg('Error: ' + err.message, 'error');
        }
    }
    
    async function confirmReject(batchId) {
        const remarks = document.getElementById('remarks-' + batchId).value;
        
        if (!remarks.trim()) {
            showMsg('Please add rejection remarks', 'error');
            return;
        }
        
        try {
            const { error } = await supabaseClient
                .from('batches')
                .update({ 
                    status: 'rejected',
                    rejection_remarks: remarks
                })
                .eq('id', batchId);
            
            if (error) {
                showMsg('Error: ' + error.message, 'error');
                return;
            }
            
            showMsg('✓ Batch rejected with remarks', 'success');
            loadBatches('pending');
            loadBatches('rejected');
        } catch (err) {
            showMsg('Error: ' + err.message, 'error');
        }
    }
    
    function logout() {
        window.location.href = 'index.html';
    }
    
    function showMsg(text, type) {
        const msg = document.getElementById('message');
        msg.textContent = text;
        msg.className = 'message show ' + type;
        setTimeout(() => msg.className = 'message', 4000);
    }
</script>

</body>
</html>
