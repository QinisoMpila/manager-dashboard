<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ClaimFlow</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --ink:#16202e; --muted:#5b6b7e; --paper:#f6f8fa; --surface:#ffffff;
    --line:#e3e7ed; --accent:#0f766e; --accent-soft:#e6f2f0;
    --pending:#b45309; --pending-soft:#fdf3e7;
    --reject:#b91c1c; --reject-soft:#fbeaea;
    --ok:#15803d; --ok-soft:#e9f4ec;
    --radius:10px;
  }
  *{box-sizing:border-box}
  body{ margin:0; background:var(--paper); color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    font-size:15px; line-height:1.45; -webkit-font-smoothing:antialiased; }
  .num{ font-variant-numeric:tabular-nums; font-feature-settings:"tnum"; }

  /* Login */
  .login-wrap{ min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px; }
  .login{ background:var(--surface); border:1px solid var(--line); border-radius:14px; padding:32px; width:100%; max-width:380px; box-shadow:0 1px 3px rgba(20,32,46,.06); }
  .login h1{ font-size:22px; margin:0 0 4px; }
  .login h1 span{ color:var(--accent); }
  .login p{ color:var(--muted); font-size:13.5px; margin:0 0 22px; }
  .login label{ display:block; font-size:13px; color:var(--muted); margin:14px 0 5px; }
  .login input{ width:100%; padding:10px 12px; border:1px solid var(--line); border-radius:8px; font-size:14px; }
  .login input:focus{ outline:none; border-color:var(--accent); }
  .login button{ width:100%; margin-top:20px; background:var(--accent); color:#fff; border:none; padding:11px; border-radius:8px; font-size:15px; font-weight:600; cursor:pointer; }
  .login button:hover{ background:#0b5d56; }
  .login .err{ background:var(--reject-soft); color:var(--reject); border:1px solid #f0caca; border-radius:8px; padding:10px 12px; font-size:13.5px; margin-top:16px; display:none; }
  .login .err.show{ display:block; }

  /* Shell */
  header.app{ background:var(--ink); color:#fff; padding:16px 24px; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:12px; }
  header.app h1{ font-size:18px; font-weight:600; margin:0; }
  header.app h1 span{ color:#7fd1c8; font-weight:500; }
  .me{ display:flex; align-items:center; gap:14px; font-size:13px; }
  .me .who{ text-align:right; }
  .me .who b{ display:block; font-weight:600; }
  .me .who small{ color:#9fb0c0; }
  .me button{ background:#1f2c3d; color:#fff; border:1px solid #2f3f54; border-radius:6px; padding:7px 12px; font-size:13px; cursor:pointer; }
  .me button:hover{ background:#26364a; }
  .badge{ background:var(--accent); color:#fff; font-size:11px; font-weight:600; padding:3px 9px; border-radius:999px; text-transform:uppercase; letter-spacing:.4px; }

  .wrap{ max-width:920px; margin:0 auto; padding:24px; }
  .tabs{ display:flex; gap:4px; border-bottom:1px solid var(--line); margin-bottom:22px; flex-wrap:wrap; }
  .tabs button{ background:none; border:none; padding:11px 16px; font-size:14px; color:var(--muted); cursor:pointer; border-bottom:2px solid transparent; margin-bottom:-1px; }
  .tabs button:hover{ color:var(--ink); }
  .tabs button.active{ color:var(--accent); border-bottom-color:var(--accent); font-weight:600; }

  .statusbar{ border-radius:var(--radius); padding:12px 16px; margin-bottom:18px; font-size:14px; display:none; }
  .statusbar.show{ display:block; }
  .statusbar.info{ background:var(--accent-soft); color:var(--accent); }
  .statusbar.err{ background:var(--reject-soft); color:var(--reject); border:1px solid #f0caca; }

  /* Form */
  .card{ background:var(--surface); border:1px solid var(--line); border-radius:12px; padding:24px; }
  .card h2{ font-size:16px; margin:0 0 4px; }
  .card .sub{ color:var(--muted); font-size:13px; margin:0 0 20px; }
  .grid2{ display:grid; grid-template-columns:1fr 1fr; gap:16px; }
  @media(max-width:560px){ .grid2{ grid-template-columns:1fr; } }
  .field{ margin-bottom:16px; }
  .field label{ display:block; font-size:13px; color:var(--muted); margin-bottom:6px; }
  .field input, .field select{ width:100%; padding:10px 12px; border:1px solid var(--line); border-radius:8px; font-size:14px; background:#fff; color:var(--ink); }
  .field input:focus, .field select:focus{ outline:none; border-color:var(--accent); }
  .primary{ background:var(--accent); color:#fff; border:none; padding:11px 20px; border-radius:8px; font-size:14px; font-weight:600; cursor:pointer; }
  .primary:hover{ background:#0b5d56; }
  .formmsg{ font-size:13.5px; margin-top:12px; }
  .formmsg.ok{ color:var(--ok); }
  .formmsg.err{ color:var(--reject); }

  /* Filter + claims */
  .subfilter{ display:flex; gap:6px; flex-wrap:wrap; margin-bottom:16px; }
  .subfilter button{ border:1px solid var(--line); background:var(--surface); color:var(--muted); padding:5px 13px; border-radius:999px; font-size:13px; cursor:pointer; }
  .subfilter button:hover{ border-color:var(--accent); color:var(--accent); }
  .subfilter button.active{ background:var(--ink); color:#fff; border-color:var(--ink); }

  .claim{ background:var(--surface); border:1px solid var(--line); border-radius:10px; padding:16px 18px; margin-bottom:12px; }
  .claim-top{ display:grid; grid-template-columns:1fr auto auto; gap:16px; align-items:center; }
  .vendor{ font-weight:600; }
  .meta{ font-size:13px; color:var(--muted); margin-top:2px; }
  .amount{ font-size:16px; font-weight:600; text-align:right; }
  .chip{ font-size:12px; font-weight:600; padding:4px 10px; border-radius:999px; white-space:nowrap; }
  .chip.draft{ background:#eef1f5; color:var(--muted); }
  .chip.pending{ background:var(--pending-soft); color:var(--pending); }
  .chip.approved{ background:var(--ok-soft); color:var(--ok); }
  .chip.rejected{ background:var(--reject-soft); color:var(--reject); }
  .chip.neutral{ background:#e7eef7; color:#3a5a82; }
  .claim-actions{ display:flex; gap:8px; margin-top:14px; padding-top:14px; border-top:1px solid var(--line); }
  .btn-sm{ padding:7px 14px; border-radius:7px; font-size:13px; font-weight:600; cursor:pointer; border:1px solid transparent; }
  .btn-edit{ background:#fff; color:var(--accent); border-color:#cfe3e0; }
  .btn-edit:hover{ background:var(--accent-soft); }
  .btn-submit2{ background:var(--accent); color:#fff; }
  .btn-submit2:hover{ background:#0b5d56; }
  .btn-del{ background:#fff; color:var(--reject); border-color:#e9c4c4; }
  .btn-del:hover{ background:var(--reject-soft); }
  .note{ font-size:12.5px; color:var(--muted); margin-top:10px; }
  .rejected-note{ font-size:13px; color:var(--reject); margin-top:10px; padding-top:10px; border-top:1px solid var(--line); }

  .empty{ text-align:center; padding:50px 20px; color:var(--muted); }
  .empty h3{ color:var(--ink); margin:0 0 6px; }
  .count{ font-size:13px; color:var(--muted); text-align:right; margin-bottom:10px; }
  .spinner{ display:inline-block; width:14px; height:14px; border:2px solid currentColor; border-right-color:transparent; border-radius:50%; animation:spin .7s linear infinite; vertical-align:-2px; margin-right:6px; }
  @keyframes spin{ to{ transform:rotate(360deg); } }

  /* Modal */
  .modal{ display:none; position:fixed; inset:0; background:rgba(20,32,46,.45); z-index:1000; align-items:center; justify-content:center; padding:20px; }
  .modal.open{ display:flex; }
  .modal-card{ background:#fff; border-radius:12px; padding:26px; width:100%; max-width:440px; max-height:90vh; overflow-y:auto; }
  .modal-card h3{ margin:0 0 18px; font-size:17px; }
  .modal-actions{ display:flex; flex-direction:column; gap:8px; margin-top:8px; }
  .ghost{ background:#fff; color:var(--muted); border:1px solid var(--line); }
  .ghost:hover{ background:var(--paper); }

  .toast{ position:fixed; bottom:20px; right:20px; background:var(--ink); color:#fff; padding:13px 18px; border-radius:8px; font-size:13.5px; z-index:2000; box-shadow:0 4px 16px rgba(20,32,46,.2); animation:rise .3s ease; }
  @keyframes rise{ from{ transform:translateY(12px); opacity:0; } to{ transform:translateY(0); opacity:1; } }
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-wrap" id="loginScreen">
  <div class="login">
    <h1>Claim<span>Flow</span></h1>
    <p>Sign in to submit and track your expense claims.</p>
    <label for="email">Email</label>
    <input id="email" type="email" autocomplete="username" placeholder="you@claimflow.test">
    <label for="password">Password</label>
    <input id="password" type="password" autocomplete="current-password" placeholder="........">
    <button id="loginBtn">Sign in</button>
    <div class="err" id="loginErr"></div>
  </div>
</div>

<!-- APP -->
<div id="app" style="display:none">
  <header class="app">
    <h1>Claim<span>Flow</span></h1>
    <div class="me">
      <div class="who"><b id="meName"></b><small id="meEmail"></small></div>
      <span class="badge" id="meBadge"></span>
      <button id="logoutBtn">Sign out</button>
    </div>
  </header>
  <div class="wrap">
    <div id="statusbar" class="statusbar"></div>
    <div class="tabs" id="tabs"></div>

    <!-- New claim -->
    <div id="view-new" class="view">
      <div class="card">
        <h2>New expense claim</h2>
        <p class="sub">Saved as a draft first — you can edit it until you submit it for approval.</p>
        <div class="grid2">
          <div class="field">
            <label>Category</label>
            <select id="f-category">
              <option value="">Select…</option>
              <option value="meal">Meal</option>
              <option value="travel">Travel</option>
              <option value="accommodation">Accommodation</option>
              <option value="mileage">Mileage</option>
              <option value="other">Other</option>
            </select>
          </div>
          <div class="field">
            <label>Amount (R)</label>
            <input id="f-amount" type="number" step="0.01" placeholder="0.00">
          </div>
        </div>
        <div class="grid2">
          <div class="field">
            <label>Profit centre</label>
            <select id="f-pc"><option value="">Select…</option></select>
          </div>
          <div class="field">
            <label>Claim date</label>
            <input id="f-date" type="date">
          </div>
        </div>
        <div class="field">
          <label>Vendor / description</label>
          <input id="f-vendor" type="text" placeholder="e.g. Uber, Restaurant ABC, Hotel XYZ">
        </div>
        <div class="field">
          <label>Additional notes (optional)</label>
          <input id="f-notes" type="text" placeholder="Any extra detail…">
        </div>
        <button class="primary" id="saveDraftBtn">Save as draft</button>
        <div id="formMsg" class="formmsg"></div>
      </div>
    </div>

    <!-- My claims -->
    <div id="view-claims" class="view" style="display:none">
      <div class="subfilter" id="claimsFilter"></div>
      <div class="count" id="claimsCount"></div>
      <div id="claimsList"></div>
    </div>
  </div>
</div>

<!-- Edit modal -->
<div class="modal" id="editModal">
  <div class="modal-card">
    <h3>Edit draft claim</h3>
    <div class="grid2">
      <div class="field"><label>Category</label>
        <select id="e-category">
          <option value="meal">Meal</option><option value="travel">Travel</option>
          <option value="accommodation">Accommodation</option><option value="mileage">Mileage</option>
          <option value="other">Other</option>
        </select>
      </div>
      <div class="field"><label>Amount (R)</label><input id="e-amount" type="number" step="0.01"></div>
    </div>
    <div class="grid2">
      <div class="field"><label>Profit centre</label><select id="e-pc"></select></div>
      <div class="field"><label>Claim date</label><input id="e-date" type="date"></div>
    </div>
    <div class="field"><label>Vendor / description</label><input id="e-vendor" type="text"></div>
    <div class="field"><label>Notes</label><input id="e-notes" type="text"></div>
    <div class="modal-actions">
      <button class="primary" id="saveEditBtn">Save changes</button>
      <button class="btn-sm btn-submit2" id="submitApprovalBtn" style="padding:11px">Submit for approval</button>
      <button class="primary ghost" id="closeEditBtn">Cancel</button>
    </div>
  </div>
</div>

<script>
// ---- Connection (publishable key — safe for the browser) ----
const SUPABASE_URL = 'https://wxjchdcohsuhyeokzmtd.supabase.co';
const SUPABASE_KEY = 'sb_publishable_IY6JOZpXAkLlHG0uUAfbeg_7roRDcEg';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ---- Helpers ----
const $ = s => document.querySelector(s);
const rand = new Intl.NumberFormat('en-ZA', { style:'currency', currency:'ZAR' });
const money = n => rand.format(Number(n || 0));
const fmtDate = d => d ? new Date(d).toLocaleDateString('en-ZA',{day:'2-digit',month:'short',year:'numeric'}) : '—';
function toast(msg){ const t=document.createElement('div'); t.className='toast'; t.textContent=msg; document.body.appendChild(t); setTimeout(()=>t.remove(),2600); }
function setStatus(msg,kind){ const el=$('#statusbar'); if(!msg){el.className='statusbar';el.innerHTML='';return;} el.className='statusbar show '+(kind||'info'); el.innerHTML=msg; }
function explain(e){ const m=(e&&e.message?e.message:String(e)).toLowerCase();
  if(m.includes('permission denied')||m.includes('row-level security')) return 'The database is blocking access (Row Level Security).';
  if(m.includes('failed to fetch')) return 'Could not reach Supabase. Check you are online and the project is not paused.';
  return e&&e.message?e.message:String(e); }

// ---- State ----
let me=null, activeTab='new', claimFilter='All';
let myTxns=[], myBatches=[], profitCentres=[], editingId=null;

// ---- Login / session ----
async function doLogin(){
  const email=$('#email').value.trim().toLowerCase(); const pw=$('#password').value; const err=$('#loginErr');
  err.className='err';
  if(!email||!pw){ err.className='err show'; err.textContent='Enter your email and password.'; return; }
  $('#loginBtn').disabled=true; $('#loginBtn').textContent='Signing in…';
  const { data, error } = await sb.from('users').select('*').eq('email',email).eq('password',pw).maybeSingle();
  $('#loginBtn').disabled=false; $('#loginBtn').textContent='Sign in';
  if(error){ err.className='err show'; err.textContent=explain(error); return; }
  if(!data){ err.className='err show'; err.textContent='Email or password not recognised.'; return; }
  if((data.status||'').toLowerCase()!=='approved'){ err.className='err show'; err.textContent='Your account has not been approved by HR yet.'; return; }
  me=data;
  try{ localStorage.setItem('claimflow_user', JSON.stringify({id:me.id})); }catch(e){}
  startApp();
}
function logout(){ try{ localStorage.removeItem('claimflow_user'); }catch(e){} location.reload(); }

async function startApp(){
  $('#loginScreen').style.display='none';
  $('#app').style.display='block';
  $('#meName').textContent = `${me.name} ${me.surname}`;
  $('#meEmail').textContent = me.email;
  $('#meBadge').textContent = me.role || 'Employee';
  buildTabs();
  await loadProfitCentres();
  $('#f-date').valueAsDate = new Date();
  await loadClaims();
}

// ---- Tabs (Stage 1: New claim + My claims for everyone) ----
function buildTabs(){
  const tabs=[{id:'new',label:'New claim'},{id:'claims',label:'My claims'}];
  const box=$('#tabs'); box.innerHTML='';
  tabs.forEach(t=>{ const b=document.createElement('button'); b.textContent=t.label;
    if(t.id===activeTab) b.className='active';
    b.onclick=()=>{ activeTab=t.id; showView(); buildTabs(); };
    box.appendChild(b); });
  showView();
}
function showView(){
  $('#view-new').style.display    = activeTab==='new'    ? 'block':'none';
  $('#view-claims').style.display = activeTab==='claims' ? 'block':'none';
  if(activeTab==='claims') renderClaims();
}

// ---- Profit centres (data-driven from the authority table, with a sensible fallback) ----
async function loadProfitCentres(){
  const { data } = await sb.from('approval_authority').select('profit_center');
  let pcs = [...new Set((data||[]).map(r=>r.profit_center).filter(Boolean))].sort();
  if(pcs.length===0) pcs = ['PC001','PC002','PC003'];
  profitCentres = pcs;
  const opts = '<option value="">Select…</option>' + pcs.map(p=>`<option value="${p}">${p}</option>`).join('');
  $('#f-pc').innerHTML = opts;
  $('#e-pc').innerHTML = pcs.map(p=>`<option value="${p}">${p}</option>`).join('');
}

// ---- Create a draft claim ----
async function saveDraft(){
  const category=$('#f-category').value, amount=parseFloat($('#f-amount').value),
        pc=$('#f-pc').value, date=$('#f-date').value, vendor=$('#f-vendor').value.trim(), notes=$('#f-notes').value.trim();
  const msg=$('#formMsg'); msg.className='formmsg';
  if(!category||!amount||!pc||!date||!vendor){ msg.className='formmsg err'; msg.textContent='Please fill in category, amount, profit centre, date and vendor.'; return; }
  $('#saveDraftBtn').disabled=true;
  const { error } = await sb.from('transactions').insert({
    employee_id: me.id, category, amount, claim_date: date, vendor, description: notes,
    profit_center: pc, status: 'draft', created_date: new Date().toISOString()
  });
  $('#saveDraftBtn').disabled=false;
  if(error){ msg.className='formmsg err'; msg.textContent='Could not save: '+explain(error); return; }
  msg.className='formmsg ok'; msg.textContent='Saved as draft.';
  ['f-category','f-amount','f-pc','f-vendor','f-notes'].forEach(id=>$('#'+id).value='');
  $('#f-date').valueAsDate=new Date();
  await loadClaims();
  setTimeout(()=>{ msg.textContent=''; },2500);
}

// ---- Load my claims + my batches (for full pipeline status) ----
async function loadClaims(){
  const [{data:txns,error:te},{data:batches,error:be}] = await Promise.all([
    sb.from('transactions').select('*').eq('employee_id', me.id).order('created_date',{ascending:false}),
    sb.from('batches').select('*').eq('employee_id', me.id)
  ]);
  if(te){ setStatus('<b>Could not load your claims.</b><br>'+explain(te),'err'); return; }
  myTxns = txns||[]; myBatches = batches||[];
  if(activeTab==='claims') renderClaims();
}

// map a transaction id -> the batch that contains it
function batchOf(txId){
  return myBatches.find(b => Array.isArray(b.transaction_ids) && b.transaction_ids.includes(txId)) || null;
}

// effective stage of a claim, following it past batching into the batch's lifecycle
function stageOf(tx){
  const s=(tx.status||'').toLowerCase();
  if(s==='draft') return {label:'Draft', cls:'draft', editable:true};
  if(s==='pending_approval') return {label:'Submitted', cls:'pending', editable:false, hint:'Awaiting the Thursday auto-batch.'};
  const b=batchOf(tx.id);
  if(b){
    const bs=(b.status||'').toLowerCase();
    if(bs==='pending')    return {label:'Awaiting approval', cls:'pending', editable:false, batch:b};
    if(bs==='approved')   return {label:'Approved', cls:'approved', editable:false, batch:b};
    if(bs==='rejected')   return {label:'Rejected', cls:'rejected', editable:false, batch:b};
    if(bs==='exported')   return {label:'Sent for payment', cls:'neutral', editable:false, batch:b};
    if(bs==='reconciled') return {label:'Paid · Reconciled', cls:'approved', editable:false, batch:b};
    return {label:b.status||'In batch', cls:'neutral', editable:false, batch:b};
  }
  if(s==='batched')  return {label:'Awaiting approval', cls:'pending', editable:false};
  if(s==='approved') return {label:'Approved', cls:'approved', editable:false};
  return {label:tx.status||'Unknown', cls:'neutral', editable:false};
}

function renderClaims(){
  // build filter from the stages actually present
  const stages = myTxns.map(t=>stageOf(t).label);
  const order = ['Draft','Submitted','Awaiting approval','Approved','Sent for payment','Paid · Reconciled','Rejected'];
  const present = [...new Set(stages)].sort((a,b)=>{
    const ia=order.indexOf(a), ib=order.indexOf(b); return (ia<0?99:ia)-(ib<0?99:ib);
  });
  const opts=['All',...present];
  if(!opts.includes(claimFilter)) claimFilter='All';
  const fbox=$('#claimsFilter'); fbox.innerHTML='';
  opts.forEach(s=>{ const b=document.createElement('button'); b.textContent=s;
    if(s===claimFilter) b.className='active';
    b.onclick=()=>{ claimFilter=s; renderClaims(); }; fbox.appendChild(b); });

  const rows = myTxns.filter(t => claimFilter==='All' || stageOf(t).label===claimFilter);
  $('#claimsCount').textContent = rows.length+(rows.length===1?' claim':' claims');

  const list=$('#claimsList');
  if(rows.length===0){ list.innerHTML='<div class="empty"><h3>No claims here</h3><p>Create one from the “New claim” tab.</p></div>'; return; }

  list.innerHTML='';
  rows.forEach(tx=>{
    const st=stageOf(tx);
    const card=document.createElement('div'); card.className='claim';
    let inner = `
      <div class="claim-top">
        <div>
          <div class="vendor">${tx.vendor||'—'}</div>
          <div class="meta">${(tx.category||'—')} · ${tx.profit_center||'no centre'} · ${fmtDate(tx.claim_date)}</div>
        </div>
        <div class="amount num">${money(tx.amount)}</div>
        <span class="chip ${st.cls}">${st.label}</span>
      </div>`;
    if(st.hint) inner += `<div class="note">${st.hint}</div>`;
    if(st.batch && (st.batch.status||'').toLowerCase()==='rejected' && st.batch.rejection_remarks)
      inner += `<div class="rejected-note">Manager's reason: ${st.batch.rejection_remarks}</div>`;
    if(st.editable){
      inner += `<div class="claim-actions">
        <button class="btn-sm btn-edit" data-edit="${tx.id}">Edit</button>
        <button class="btn-sm btn-submit2" data-submit="${tx.id}">Submit for approval</button>
        <button class="btn-sm btn-del" data-del="${tx.id}">Delete</button>
      </div>`;
    }
    card.innerHTML=inner;
    list.appendChild(card);
  });

  list.querySelectorAll('[data-edit]').forEach(b=>b.onclick=()=>openEdit(Number(b.dataset.edit)));
  list.querySelectorAll('[data-submit]').forEach(b=>b.onclick=()=>submitForApproval(Number(b.dataset.submit)));
  list.querySelectorAll('[data-del]').forEach(b=>b.onclick=()=>deleteDraft(Number(b.dataset.del)));
}

// ---- Edit / submit / delete (drafts only) ----
function openEdit(id){
  const tx=myTxns.find(t=>t.id===id); if(!tx) return;
  editingId=id;
  $('#e-category').value=tx.category||'other';
  $('#e-amount').value=tx.amount;
  $('#e-pc').value=tx.profit_center||profitCentres[0];
  $('#e-date').value=tx.claim_date;
  $('#e-vendor').value=tx.vendor||'';
  $('#e-notes').value=tx.description||'';
  $('#editModal').classList.add('open');
}
function closeEdit(){ $('#editModal').classList.remove('open'); editingId=null; }

async function saveEdit(){
  if(!editingId) return;
  const upd={ category:$('#e-category').value, amount:parseFloat($('#e-amount').value),
    profit_center:$('#e-pc').value, claim_date:$('#e-date').value,
    vendor:$('#e-vendor').value.trim(), description:$('#e-notes').value.trim(),
    last_edited_date:new Date().toISOString() };
  const { error } = await sb.from('transactions').update(upd).eq('id',editingId).eq('status','draft');
  if(error){ toast('Could not save: '+explain(error)); return; }
  toast('Claim updated'); closeEdit(); await loadClaims();
}

async function submitForApproval(id){
  if(!confirm('Submit this claim for approval? Once submitted you can no longer edit it. It will be auto-batched on Thursday.')) return;
  const { data:updated, error } = await sb.from('transactions')
    .update({ status:'pending_approval' }).eq('id',id).eq('status','draft').select();
  if(error){ toast('Could not submit: '+explain(error)); return; }
  if(!updated||updated.length===0){ toast('That claim is no longer a draft.'); }
  else toast('Submitted for approval');
  closeEdit(); await loadClaims();
}

async function deleteDraft(id){
  if(!confirm('Delete this draft? This cannot be undone.')) return;
  const { error } = await sb.from('transactions').delete().eq('id',id).eq('status','draft');
  if(error){ toast('Could not delete: '+explain(error)); return; }
  toast('Draft deleted'); await loadClaims();
}

// ---- Boot ----
$('#loginBtn').onclick=doLogin;
$('#password').addEventListener('keydown',e=>{ if(e.key==='Enter') doLogin(); });
$('#logoutBtn').onclick=logout;
$('#saveDraftBtn').onclick=saveDraft;
$('#saveEditBtn').onclick=saveEdit;
$('#submitApprovalBtn').onclick=()=>{ if(editingId) submitForApproval(editingId); };
$('#closeEditBtn').onclick=closeEdit;

(async function(){
  // resume an existing session if present
  let stored=null; try{ stored=JSON.parse(localStorage.getItem('claimflow_user')||'null'); }catch(e){}
  if(stored && stored.id){
    const { data } = await sb.from('users').select('*').eq('id',stored.id).maybeSingle();
    if(data){ me=data; startApp(); }
  }
})();
</script>
