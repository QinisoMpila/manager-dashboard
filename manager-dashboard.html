<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ClaimFlow · Review</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --ink:#16202e; --muted:#5b6b7e; --paper:#f6f8fa; --surface:#ffffff;
    --line:#e3e7ed; --accent:#0f766e; --accent-soft:#e6f2f0;
    --pending:#b45309; --pending-soft:#fdf3e7;
    --reject:#b91c1c; --reject-soft:#fbeaea;
    --ok:#15803d; --ok-soft:#e9f4ec;
    --flag:#9333ea; --flag-soft:#f3e8fd;
    --radius:10px;
  }
  *{box-sizing:border-box}
  body{ margin:0; background:var(--paper); color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    font-size:15px; line-height:1.45; -webkit-font-smoothing:antialiased; }
  .num{ font-variant-numeric:tabular-nums; font-feature-settings:"tnum"; }

  /* Login */
  .login-wrap{ min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px; }
  .login{ background:var(--surface); border:1px solid var(--line); border-radius:14px; padding:32px; width:100%; max-width:380px; box-shadow:0 1px 3px rgba(20,32,46,.06); }
  .login h1{ font-size:20px; margin:0 0 4px; }
  .login h1 span{ color:var(--accent); }
  .login p{ color:var(--muted); font-size:13.5px; margin:0 0 22px; }
  .login label{ display:block; font-size:13px; color:var(--muted); margin:14px 0 5px; }
  .login input{ width:100%; padding:10px 12px; border:1px solid var(--line); border-radius:8px; font-size:14px; }
  .login input:focus{ outline:none; border-color:var(--accent); }
  .login button{ width:100%; margin-top:20px; background:var(--accent); color:#fff; border:none; padding:11px; border-radius:8px; font-size:15px; font-weight:600; cursor:pointer; }
  .login button:hover{ background:#0b5d56; }
  .login .err{ background:var(--reject-soft); color:var(--reject); border:1px solid #f0caca; border-radius:8px; padding:10px 12px; font-size:13.5px; margin-top:16px; display:none; }
  .login .err.show{ display:block; }

  /* Shell */
  header{ background:var(--ink); color:#fff; padding:16px 24px; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:12px; }
  header h1{ font-size:18px; font-weight:600; margin:0; }
  header h1 span{ color:#7fd1c8; font-weight:500; }
  .me{ display:flex; align-items:center; gap:14px; font-size:13px; }
  .me .who{ text-align:right; }
  .me .who b{ display:block; font-weight:600; }
  .me .who small{ color:#9fb0c0; }
  .me button{ background:#1f2c3d; color:#fff; border:1px solid #2f3f54; border-radius:6px; padding:7px 12px; font-size:13px; cursor:pointer; }
  .me button:hover{ background:#26364a; }
  .badge{ background:var(--accent); color:#fff; font-size:11px; font-weight:600; padding:3px 9px; border-radius:999px; text-transform:uppercase; letter-spacing:.4px; }

  .wrap{ max-width:980px; margin:0 auto; padding:24px; }
  .tabs{ display:flex; gap:4px; border-bottom:1px solid var(--line); margin-bottom:20px; }
  .tabs button{ background:none; border:none; padding:11px 16px; font-size:14px; color:var(--muted); cursor:pointer; border-bottom:2px solid transparent; margin-bottom:-1px; }
  .tabs button:hover{ color:var(--ink); }
  .tabs button.active{ color:var(--accent); border-bottom-color:var(--accent); font-weight:600; }
  .tabs button .pill{ background:var(--pending-soft); color:var(--pending); font-size:11px; font-weight:700; padding:1px 7px; border-radius:999px; margin-left:6px; }

  .statusbar{ border-radius:var(--radius); padding:12px 16px; margin-bottom:18px; font-size:14px; display:none; }
  .statusbar.show{ display:block; }
  .statusbar.info{ background:var(--accent-soft); color:var(--accent); }
  .statusbar.err{ background:var(--reject-soft); color:var(--reject); border:1px solid #f0caca; }

  .hint{ font-size:13px; color:var(--muted); margin:-6px 0 16px; }

  .batch{ background:var(--surface); border:1px solid var(--line); border-radius:var(--radius); margin-bottom:12px; overflow:hidden; }
  .batch.flagged{ border-color:#e3c2f5; }
  .batch-head{ display:grid; grid-template-columns:1fr auto auto; gap:16px; align-items:center; padding:16px 18px; cursor:pointer; }
  .batch-head:hover{ background:#fafbfc; }
  .who{ font-weight:600; }
  .meta{ font-size:13px; color:var(--muted); margin-top:2px; }
  .meta b{ color:var(--ink); font-weight:500; }
  .amount{ font-size:17px; font-weight:600; text-align:right; }
  .amount small{ display:block; font-size:11px; color:var(--muted); font-weight:400; }

  .chip{ font-size:12px; font-weight:600; padding:4px 10px; border-radius:999px; white-space:nowrap; text-transform:capitalize; }
  .chip.pending{ background:var(--pending-soft); color:var(--pending); }
  .chip.approved{ background:var(--ok-soft); color:var(--ok); }
  .chip.rejected{ background:var(--reject-soft); color:var(--reject); }
  .chip.neutral{ background:#eef1f5; color:var(--muted); }
  .chip.flag{ background:var(--flag-soft); color:var(--flag); }

  .body{ display:none; border-top:1px solid var(--line); padding:4px 18px 18px; }
  .body.open{ display:block; }
  table{ width:100%; border-collapse:collapse; margin-top:10px; font-size:13.5px; }
  th{ text-align:left; color:var(--muted); font-weight:500; font-size:12px; text-transform:uppercase; letter-spacing:.4px; padding:8px; border-bottom:1px solid var(--line); }
  td{ padding:9px 8px; border-bottom:1px solid #eef1f5; vertical-align:top; }
  td.r{ text-align:right; }
  tr:last-child td{ border-bottom:none; }
  .vendor{ font-weight:500; }
  .desc{ color:var(--muted); font-size:12.5px; }
  .receipt{ color:var(--accent); text-decoration:none; font-size:12.5px; font-weight:500; }
  .receipt:hover{ text-decoration:underline; }
  .noreceipt{ color:var(--muted); font-size:12.5px; }

  .route{ font-size:12.5px; color:var(--muted); margin-top:12px; padding:10px 12px; background:#fafbfc; border:1px solid var(--line); border-radius:8px; }
  .route b{ color:var(--ink); }
  .actions{ display:flex; gap:10px; margin-top:14px; }
  .btn{ padding:9px 18px; border-radius:8px; font-size:14px; font-weight:600; cursor:pointer; border:1px solid transparent; }
  .btn-approve{ background:var(--accent); color:#fff; }
  .btn-approve:hover{ background:#0b5d56; }
  .btn-reject{ background:#fff; color:var(--reject); border-color:#e9c4c4; }
  .btn-reject:hover{ background:var(--reject-soft); }
  .decided{ font-size:13px; color:var(--muted); margin-top:14px; padding-top:14px; border-top:1px solid var(--line); }
  .decided b{ color:var(--ink); }

  .empty{ text-align:center; padding:56px 20px; color:var(--muted); }
  .empty h3{ color:var(--ink); margin:0 0 6px; }
  .spinner{ display:inline-block; width:14px; height:14px; border:2px solid currentColor; border-right-color:transparent; border-radius:50%; animation:spin .7s linear infinite; vertical-align:-2px; margin-right:6px; }
  @keyframes spin{ to{ transform:rotate(360deg); } }
  .count{ font-size:13px; color:var(--muted); text-align:right; margin-bottom:10px; }
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-wrap" id="loginScreen">
  <div class="login">
    <h1>ClaimFlow <span>Review</span></h1>
    <p>Sign in with your work email.</p>
    <label for="email">Email</label>
    <input id="email" type="email" autocomplete="username" placeholder="you@claimflow.test">
    <label for="password">Password</label>
    <input id="password" type="password" autocomplete="current-password" placeholder="........">
    <button id="loginBtn">Sign in</button>
    <div class="err" id="loginErr"></div>
  </div>
</div>

<!-- APP -->
<div id="app" style="display:none">
  <header>
    <h1>ClaimFlow <span>· Review</span></h1>
    <div class="me">
      <div class="who"><b id="meName"></b><small id="meRole"></small></div>
      <span class="badge" id="meBadge"></span>
      <button id="logoutBtn">Sign out</button>
    </div>
  </header>
  <div class="wrap">
    <div id="statusbar" class="statusbar"></div>
    <div class="tabs" id="tabs"></div>
    <div class="hint" id="hint"></div>
    <div class="count" id="count"></div>
    <div id="list"></div>
  </div>
</div>

<script>
// ---- Connection (public anon key — safe for the browser) ----
const SUPABASE_URL = 'https://wxjchdcohsuhyeokzmtd.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind4amNoZGNvaHN1aHllb2t6bXRkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEwODUwMTMsImV4cCI6MjA5NjY2MTAxM30.esRWzrenvdem9wMJQhHVilO082_fJTqHg-zQzRbpL6U';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ---- Helpers ----
const $ = s => document.querySelector(s);
const rand = new Intl.NumberFormat('en-ZA', { style:'currency', currency:'ZAR' });
const money = n => rand.format(Number(n || 0));
const fmtDate = d => d ? new Date(d).toLocaleDateString('en-ZA',{day:'2-digit',month:'short',year:'numeric'}) : '—';
const nameOf = id => userMap[id] ? `${userMap[id].name} ${userMap[id].surname}` : ('User #' + id);
const roleOf = id => userMap[id] ? userMap[id].role : null;

function explain(error){
  const m = (error && error.message ? error.message : String(error)).toLowerCase();
  if(m.includes('permission denied') || m.includes('row-level security') || m.includes('rls'))
    return 'The database is blocking access (Row Level Security). Tell Claude you got a "permission denied" error for a one-line SQL fix.';
  if(m.includes('failed to fetch') || m.includes('networkerror'))
    return 'Could not reach Supabase. Check the project is not paused and that you are online.';
  return error && error.message ? error.message : String(error);
}
function setStatus(msg, kind){
  const el=$('#statusbar');
  if(!msg){ el.className='statusbar'; el.innerHTML=''; return; }
  el.className='statusbar show '+(kind||'info'); el.innerHTML=msg;
}

// ---- State ----
let me = null;            // logged-in user
let userMap = {};          // id -> {name, surname, role}
let authorityMap = {};     // profit_center -> [manager_id, ...]   (a centre can have several managers)
let allBatches = [];
let activeTab = '';

// ===== ROUTING: who must approve a given batch (decided by the SUBMITTER's role) =====
function approverFor(batch){
  const r = roleOf(batch.employee_id);
  if(r === 'Director') return { tier:'self' };
  if(r === 'Manager')  return { tier:'director' };
  const mgrs = authorityMap[batch.profit_center] || [];
  return { tier:'manager', managerIds: mgrs };   // list — any one of them may approve
}
function isPending(b){ return (b.status||'').toLowerCase() === 'pending'; }

// Can the logged-in person act on this batch right now?
function canIActOn(b){
  if(!isPending(b)) return false;
  const a = approverFor(b);
  if(me.role === 'Director' && a.tier === 'director') return true;
  if(me.role === 'Director' && a.tier === 'self' && b.employee_id === me.id) return true;
  if(me.role === 'Manager'  && a.tier === 'manager' && a.managerIds.includes(me.id)) return true;
  return false;
}

// ---- Login ----
async function doLogin(){
  const email = $('#email').value.trim().toLowerCase();
  const pw = $('#password').value;
  const errEl = $('#loginErr');
  errEl.className = 'err';
  if(!email || !pw){ errEl.className='err show'; errEl.textContent='Enter your email and password.'; return; }

  $('#loginBtn').disabled = true; $('#loginBtn').textContent = 'Signing in…';
  const { data, error } = await sb.from('users')
    .select('id, name, surname, role, email, profit_center')
    .eq('email', email).eq('password', pw).maybeSingle();
  $('#loginBtn').disabled = false; $('#loginBtn').textContent = 'Sign in';

  if(error){ errEl.className='err show'; errEl.textContent = explain(error); return; }
  if(!data){ errEl.className='err show'; errEl.textContent = 'Email or password not recognised.'; return; }

  me = data;
  $('#loginScreen').style.display='none';
  $('#app').style.display='block';
  $('#meName').textContent = `${me.name} ${me.surname}`;
  $('#meRole').textContent = me.email;
  $('#meBadge').textContent = me.role || 'Employee';
  await loadReference();
  buildTabs();
}
function logout(){ me=null; location.reload(); }

// ---- Reference data ----
async function loadReference(){
  setStatus('<span class="spinner"></span>Loading…','info');
  const [{data:users,error:ue},{data:auth,error:ae},{data:batches,error:be}] = await Promise.all([
    sb.from('users').select('id, name, surname, role'),
    sb.from('approval_authority').select('profit_center, manager_id'),
    sb.from('batches').select('*').order('created_date',{ascending:false})
  ]);
  if(ue||be){ setStatus('<b>Could not load data.</b><br>'+explain(ue||be),'err'); return; }
  userMap = {}; (users||[]).forEach(u => userMap[u.id]=u);
  // build a LIST of managers per profit centre
  authorityMap = {};
  (auth||[]).forEach(a => {
    if(!authorityMap[a.profit_center]) authorityMap[a.profit_center] = [];
    authorityMap[a.profit_center].push(a.manager_id);
  });
  if(ae) console.warn('authority table not loaded', ae);
  allBatches = batches||[];
  setStatus('');
}

// ---- Tabs depend on role ----
function buildTabs(){
  const tabs = [];
  if(me.role === 'Manager' || me.role === 'Director'){
    tabs.push({ id:'queue', label:'Approval queue', pill:batchesForQueue().length });
  }
  tabs.push({ id:'mine', label:'My claims' });
  if(me.role === 'Director') tabs.push({ id:'oversight', label:'Oversight (read-only)' });

  if(!activeTab || !tabs.some(t=>t.id===activeTab)) activeTab = tabs[0].id;

  const box = $('#tabs'); box.innerHTML='';
  tabs.forEach(t => {
    const b=document.createElement('button');
    b.innerHTML = t.label + (t.pill ? `<span class="pill">${t.pill}</span>` : '');
    if(t.id===activeTab) b.className='active';
    b.onclick = ()=>{ activeTab=t.id; buildTabs(); };
    box.appendChild(b);
  });
  render();
}

// ---- Queues ----
function batchesForQueue(){ return allBatches.filter(canIActOn); }
function batchesMine(){ return allBatches.filter(b => b.employee_id === me.id); }
function batchesOversight(){ return allBatches; }

function render(){
  const hint = $('#hint');
  let rows = [];
  if(activeTab==='queue'){ rows = batchesForQueue();
    hint.textContent = me.role==='Director'
      ? 'Batches submitted by managers (and your own, self-approved) that are waiting on you.'
      : 'Batches from your team that are waiting for your approval. The first manager to approve clears it for everyone.';
  } else if(activeTab==='mine'){ rows = batchesMine();
    hint.textContent = 'Claims you submitted. These are reviewed by your approver — you cannot approve your own.';
  } else { rows = batchesOversight();
    hint.textContent = 'Every batch across all profit centres, for audit. Read-only — you act only from the Approval queue.';
  }
  $('#count').textContent = rows.length + (rows.length===1?' batch':' batches');
  const list = $('#list');
  if(rows.length===0){ list.innerHTML='<div class="empty"><h3>Nothing here</h3><p>This view is empty right now.</p></div>'; return; }
  list.innerHTML='';
  rows.forEach(b => list.appendChild(renderBatch(b)));
}

function chipFor(b){
  const a = approverFor(b);
  if(isPending(b) && a.tier==='manager' && a.managerIds.length===0) return {cls:'flag', text:'Unrouted'};
  const s=(b.status||'').toLowerCase();
  if(s.includes('approve')) return {cls:'approved', text:b.status};
  if(s.includes('reject'))  return {cls:'rejected', text:b.status};
  if(s.includes('pending')) return {cls:'pending', text:b.status};
  return {cls:'neutral', text:b.status||'unknown'};
}

function renderBatch(b){
  const card=document.createElement('div');
  const a = approverFor(b);
  const unrouted = isPending(b) && a.tier==='manager' && a.managerIds.length===0;
  card.className='batch'+(unrouted?' flagged':'');
  const count = Array.isArray(b.transaction_ids)?b.transaction_ids.length:0;
  const chip = chipFor(b);
  card.innerHTML=`
    <div class="batch-head">
      <div>
        <div class="who">${nameOf(b.employee_id)} <span style="font-weight:400;color:var(--muted);font-size:12.5px">· ${roleOf(b.employee_id)||'—'}</span></div>
        <div class="meta">Batch #${b.id} · <b>${b.profit_center||'—'}</b> · ${count} claim${count===1?'':'s'} · ${fmtDate(b.created_date)}</div>
      </div>
      <div class="amount num">${money(b.total_amount)}<small>${count} item${count===1?'':'s'}</small></div>
      <span class="chip ${chip.cls}">${chip.text}</span>
    </div>
    <div class="body" id="body-${b.id}"></div>`;
  card.querySelector('.batch-head').onclick=()=>toggle(b);
  return card;
}

// ---- Drill into a batch: claim lines + supporting documents ----
async function toggle(b){
  const body=$('#body-'+b.id);
  if(body.classList.contains('open')){ body.classList.remove('open'); return; }
  body.classList.add('open');
  body.innerHTML='<p class="meta" style="padding:12px 0"><span class="spinner"></span>Loading claim lines…</p>';

  const ids = Array.isArray(b.transaction_ids)?b.transaction_ids:[];
  if(ids.length===0){ body.innerHTML='<p class="meta" style="padding:12px 0">No claim lines recorded.</p>'; return; }

  const { data:txns, error } = await sb.from('transactions').select('*').in('id', ids);
  if(error){ body.innerHTML='<p class="meta" style="padding:12px 0;color:var(--reject)">Could not load claims: '+explain(error)+'</p>'; return; }

  let docMap={};
  const { data:docs } = await sb.from('documents').select('transaction_id, file_url, file_type, upload_date').in('transaction_id', ids);
  (docs||[]).forEach(d=>{ docMap[d.transaction_id]=d; });

  const rowsHtml = (txns||[]).map(t=>{
    const d = docMap[t.id];
    const receipt = d
      ? `<a class="receipt" href="${d.file_url}" target="_blank" rel="noopener">View receipt</a><div class="desc">${(d.file_type||'file')} · ${fmtDate(d.upload_date)}</div>`
      : `<span class="noreceipt">No receipt attached</span>`;
    return `<tr>
      <td>${fmtDate(t.claim_date)}</td>
      <td><div class="vendor">${t.vendor||'—'}</div><div class="desc">${t.description||''}</div></td>
      <td>${t.category||'—'}</td>
      <td>${receipt}</td>
      <td class="r num">${money(t.amount)}</td>
    </tr>`;
  }).join('');

  const a = approverFor(b);
  let routeText;
  if(a.tier==='self') routeText = `Submitted by a Director — <b>self-approved</b>.`;
  else if(a.tier==='director') routeText = `Submitted by a Manager — approval sits with a <b>Director</b>.`;
  else if(a.managerIds.length===0) routeText = `<span style="color:var(--flag)"><b>Unrouted:</b> ${b.profit_center||'no profit centre'} has no Manager assigned. Add one to the authority table.</span>`;
  else routeText = `Approval sits with <b>${a.managerIds.map(nameOf).join(' or ')}</b> (Manager${a.managerIds.length>1?'s':''}, ${b.profit_center}). First to approve clears it.`;

  let footer;
  if(!isPending(b)){
    const by = b.approved_by_manager_id ? nameOf(b.approved_by_manager_id) : '—';
    const self = b.approved_by_manager_id && b.approved_by_manager_id===b.employee_id;
    footer = `<div class="decided">Decision: <b style="text-transform:capitalize">${b.status}</b> on ${fmtDate(b.approved_date)} by ${by}${self?' · <b>Self-approved · Director</b>':''}.`
      + (b.rejection_remarks?`<br>Remarks: ${b.rejection_remarks}`:'') + `</div>`;
  } else if(canIActOn(b)){
    const selfNote = (a.tier==='self') ? ' <span class="desc">(your own batch — self-approval is logged)</span>' : '';
    footer = `<div class="actions">
        <button class="btn btn-approve" onclick="decide(${b.id},'approve')">Approve batch</button>
        <button class="btn btn-reject" onclick="decide(${b.id},'reject')">Reject…</button>
      </div>${selfNote}`;
  } else {
    footer = `<div class="decided">Awaiting approval. You are not the approver for this batch, so it is read-only for you.</div>`;
  }

  body.innerHTML = `
    <table>
      <thead><tr><th>Date</th><th>Vendor / detail</th><th>Category</th><th>Receipt</th><th class="r">Amount</th></tr></thead>
      <tbody>${rowsHtml}</tbody>
    </table>
    <div class="route">${routeText}</div>
    ${footer}`;
}

// ---- Approve / Reject (with double-approval guard) ----
async function decide(batchId, action){
  const b = allBatches.find(x=>x.id===batchId);
  if(!b || !canIActOn(b)){ alert('You are not the approver for this batch.'); return; }

  let update;
  if(action==='approve'){
    update={ status:'approved', approved_date:new Date().toISOString(), approved_by_manager_id:me.id };
  } else {
    const remarks = prompt('Reason for rejection (the employee will see this):');
    if(remarks===null) return;
    update={ status:'rejected', approved_date:new Date().toISOString(), approved_by_manager_id:me.id, rejection_remarks:remarks };
  }
  setStatus('<span class="spinner"></span>Saving decision…','info');
  // Only writes if the batch is STILL pending — this is what stops a second manager double-approving.
  const { data:updated, error } = await sb.from('batches')
    .update(update).eq('id', batchId).eq('status','pending').select();
  if(error){ setStatus('<b>Could not save.</b><br>'+explain(error),'err'); return; }
  if(!updated || updated.length===0){
    setStatus('This batch was just decided by another approver — nothing more to do. Refreshing.','info');
    setTimeout(()=>setStatus(''),2400);
    await loadReference(); buildTabs(); return;
  }
  setStatus('Decision saved.','info');
  setTimeout(()=>setStatus(''),1600);
  await loadReference();
  buildTabs();
}

// ---- Wire up ----
$('#loginBtn').onclick = doLogin;
$('#password').addEventListener('keydown', e=>{ if(e.key==='Enter') doLogin(); });
$('#logoutBtn').onclick = logout;
</script>
</body>
</html>
