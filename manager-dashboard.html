<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ClaimFlow · Manager Review</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --ink:#16202e; --muted:#5b6b7e; --paper:#f6f8fa; --surface:#ffffff;
    --line:#e3e7ed; --accent:#0f766e; --accent-soft:#e6f2f0;
    --pending:#b45309; --pending-soft:#fdf3e7;
    --reject:#b91c1c; --reject-soft:#fbeaea;
    --ok:#15803d; --ok-soft:#e9f4ec;
    --radius:10px;
  }
  *{box-sizing:border-box}
  body{
    margin:0; background:var(--paper); color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    font-size:15px; line-height:1.45; -webkit-font-smoothing:antialiased;
  }
  .num{ font-variant-numeric:tabular-nums; font-feature-settings:"tnum"; }

  header{
    background:var(--ink); color:#fff; padding:18px 24px;
    display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:14px;
  }
  header h1{ font-size:18px; font-weight:600; margin:0; letter-spacing:.2px; }
  header h1 span{ color:#7fd1c8; font-weight:500; }
  .reviewer{ display:flex; align-items:center; gap:8px; font-size:13px; color:#b9c4d0; }
  .reviewer select{
    background:#1f2c3d; color:#fff; border:1px solid #2f3f54; border-radius:6px;
    padding:6px 10px; font-size:13px;
  }

  .wrap{ max-width:980px; margin:0 auto; padding:24px; }

  .statusbar{
    border-radius:var(--radius); padding:12px 16px; margin-bottom:18px; font-size:14px;
    display:none;
  }
  .statusbar.show{ display:block; }
  .statusbar.info{ background:var(--accent-soft); color:var(--accent); }
  .statusbar.err{ background:var(--reject-soft); color:var(--reject); border:1px solid #f0caca; }

  .toolbar{ display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:14px; flex-wrap:wrap; }
  .filters{ display:flex; gap:6px; flex-wrap:wrap; }
  .filters button{
    border:1px solid var(--line); background:var(--surface); color:var(--muted);
    padding:6px 14px; border-radius:999px; font-size:13px; cursor:pointer; transition:all .15s;
  }
  .filters button:hover{ border-color:var(--accent); color:var(--accent); }
  .filters button.active{ background:var(--ink); color:#fff; border-color:var(--ink); }
  .count{ font-size:13px; color:var(--muted); }

  .batch{
    background:var(--surface); border:1px solid var(--line); border-radius:var(--radius);
    margin-bottom:12px; overflow:hidden;
  }
  .batch-head{
    display:grid; grid-template-columns: 1fr auto auto; gap:16px; align-items:center;
    padding:16px 18px; cursor:pointer;
  }
  .batch-head:hover{ background:#fafbfc; }
  .who{ font-weight:600; }
  .meta{ font-size:13px; color:var(--muted); margin-top:2px; }
  .meta b{ color:var(--ink); font-weight:500; }
  .amount{ font-size:17px; font-weight:600; text-align:right; }
  .amount small{ display:block; font-size:11px; color:var(--muted); font-weight:400; }

  .chip{ font-size:12px; font-weight:600; padding:4px 10px; border-radius:999px; white-space:nowrap; text-transform:capitalize; }
  .chip.pending{ background:var(--pending-soft); color:var(--pending); }
  .chip.approved{ background:var(--ok-soft); color:var(--ok); }
  .chip.rejected{ background:var(--reject-soft); color:var(--reject); }
  .chip.neutral{ background:#eef1f5; color:var(--muted); }

  .body{ display:none; border-top:1px solid var(--line); padding:4px 18px 18px; }
  .body.open{ display:block; }

  table{ width:100%; border-collapse:collapse; margin-top:10px; font-size:13.5px; }
  th{ text-align:left; color:var(--muted); font-weight:500; font-size:12px; text-transform:uppercase; letter-spacing:.4px; padding:8px 8px; border-bottom:1px solid var(--line); }
  td{ padding:9px 8px; border-bottom:1px solid #eef1f5; vertical-align:top; }
  td.r{ text-align:right; }
  tr:last-child td{ border-bottom:none; }
  .vendor{ font-weight:500; }
  .desc{ color:var(--muted); font-size:12.5px; }
  .receipt{ color:var(--accent); text-decoration:none; font-size:12.5px; }
  .receipt:hover{ text-decoration:underline; }

  .actions{ display:flex; gap:10px; margin-top:16px; padding-top:14px; border-top:1px solid var(--line); }
  .btn{ padding:9px 18px; border-radius:8px; font-size:14px; font-weight:600; cursor:pointer; border:1px solid transparent; }
  .btn-approve{ background:var(--accent); color:#fff; }
  .btn-approve:hover{ background:#0b5d56; }
  .btn-reject{ background:#fff; color:var(--reject); border-color:#e9c4c4; }
  .btn-reject:hover{ background:var(--reject-soft); }
  .btn:disabled{ opacity:.5; cursor:default; }
  .decided{ font-size:13px; color:var(--muted); margin-top:14px; padding-top:14px; border-top:1px solid var(--line); }

  .empty{ text-align:center; padding:60px 20px; color:var(--muted); }
  .empty h3{ color:var(--ink); margin:0 0 6px; }
  .spinner{ display:inline-block; width:14px; height:14px; border:2px solid currentColor; border-right-color:transparent; border-radius:50%; animation:spin .7s linear infinite; vertical-align:-2px; margin-right:6px; }
  @keyframes spin{ to{ transform:rotate(360deg); } }
</style>
</head>
<body>

<header>
  <h1>ClaimFlow <span>· Manager Review</span></h1>
  <div class="reviewer">
    Reviewing as
    <select id="manager"><option value="">Select your name…</option></select>
  </div>
</header>

<div class="wrap">
  <div id="statusbar" class="statusbar"></div>

  <div class="toolbar">
    <div class="filters" id="filters"></div>
    <div class="count" id="count"></div>
  </div>

  <div id="list"></div>
</div>

<script>
// ---- Connection (public anon key — safe for the browser) ----
const SUPABASE_URL = 'https://wxjchdcohsuhyeokzmtd.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind4amNoZGNvaHN1aHllb2t6bXRkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEwODUwMTMsImV4cCI6MjA5NjY2MTAxM30.esRWzrenvdem9wMJQhHVilO082_fJTqHg-zQzRbpL6U';

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ---- Helpers ----
const $ = s => document.querySelector(s);
const rand = new Intl.NumberFormat('en-ZA', { style:'currency', currency:'ZAR' });
const money = n => rand.format(Number(n || 0));
const fmtDate = d => d ? new Date(d).toLocaleDateString('en-ZA', { day:'2-digit', month:'short', year:'numeric' }) : '—';

function setStatus(msg, kind){
  const el = $('#statusbar');
  if(!msg){ el.className = 'statusbar'; el.innerHTML = ''; return; }
  el.className = 'statusbar show ' + (kind || 'info');
  el.innerHTML = msg;
}

// Friendly translation of the most common failure causes
function explain(error){
  const m = (error && error.message ? error.message : String(error)).toLowerCase();
  if(m.includes('permission denied') || m.includes('row-level security') || m.includes('rls'))
    return 'The database is blocking read access for this table (Row Level Security). ' +
           'Tell Claude you got a “permission denied” error and it will give you a one-line SQL fix.';
  if(m.includes('failed to fetch') || m.includes('networkerror'))
    return 'Could not reach Supabase. Check the project is not paused and that you are online.';
  if(m.includes('jwt') || m.includes('apikey') || m.includes('invalid'))
    return 'The public key was rejected. The key in this file may be wrong or expired.';
  return error && error.message ? error.message : String(error);
}

// ---- State ----
let userMap = {};      // id -> "Name Surname"
let allBatches = [];   // every batch
let activeFilter = 'All';

// ---- Load users (for names + the reviewer dropdown) ----
async function loadUsers(){
  const { data, error } = await sb.from('users').select('id, name, surname');
  if(error){ console.warn('users load failed', error); return; } // non-fatal
  const sel = $('#manager');
  (data || []).forEach(u => {
    const full = [u.name, u.surname].filter(Boolean).join(' ') || ('User ' + u.id);
    userMap[u.id] = full;
    const opt = document.createElement('option');
    opt.value = u.id; opt.textContent = full;
    sel.appendChild(opt);
  });
}

// ---- Load all batches ----
async function loadBatches(){
  setStatus('<span class="spinner"></span>Loading batches…', 'info');
  const { data, error } = await sb
    .from('batches')
    .select('*')
    .order('created_date', { ascending:false });

  if(error){
    setStatus('<b>Could not load batches.</b><br>' + explain(error), 'err');
    return;
  }
  allBatches = data || [];
  setStatus('');           // clear
  buildFilters();
  render();
}

// ---- Build filter chips from the statuses actually present ----
function buildFilters(){
  const statuses = [...new Set(allBatches.map(b => b.status).filter(Boolean))];
  const opts = ['All', ...statuses];
  const box = $('#filters');
  box.innerHTML = '';
  opts.forEach(s => {
    const b = document.createElement('button');
    b.textContent = s === 'All' ? 'All' : s;
    b.className = (s === activeFilter ? 'active' : '');
    b.onclick = () => { activeFilter = s; buildFilters(); render(); };
    box.appendChild(b);
  });
}

function chipClass(status){
  const s = (status || '').toLowerCase();
  if(s.includes('approve')) return 'approved';
  if(s.includes('reject')) return 'rejected';
  if(s.includes('batch') || s.includes('pending')) return 'pending';
  return 'neutral';
}

// ---- Render the list ----
function render(){
  const list = $('#list');
  const rows = activeFilter === 'All'
    ? allBatches
    : allBatches.filter(b => b.status === activeFilter);

  $('#count').textContent = rows.length + (rows.length === 1 ? ' batch' : ' batches');

  if(rows.length === 0){
    list.innerHTML = '<div class="empty"><h3>Nothing here</h3><p>No batches match this filter.</p></div>';
    return;
  }

  list.innerHTML = '';
  rows.forEach(b => {
    const card = document.createElement('div');
    card.className = 'batch';
    const count = Array.isArray(b.transaction_ids) ? b.transaction_ids.length : 0;
    card.innerHTML = `
      <div class="batch-head">
        <div>
          <div class="who">${userMap[b.employee_id] || ('Employee #' + b.employee_id)}</div>
          <div class="meta">Batch #${b.id} · <b>${b.profit_center || '—'}</b> · ${count} claim${count===1?'':'s'} · ${fmtDate(b.created_date)}</div>
        </div>
        <div class="amount num">${money(b.total_amount)}<small>${count} item${count===1?'':'s'}</small></div>
        <span class="chip ${chipClass(b.status)}">${b.status || 'unknown'}</span>
      </div>
      <div class="body" id="body-${b.id}"></div>`;
    card.querySelector('.batch-head').onclick = () => toggle(b);
    list.appendChild(card);
  });
}

// ---- Expand a batch: load its transactions + receipts ----
async function toggle(b){
  const body = $('#body-' + b.id);
  if(body.classList.contains('open')){ body.classList.remove('open'); return; }
  body.classList.add('open');
  body.innerHTML = '<p class="meta" style="padding:12px 0"><span class="spinner"></span>Loading claim lines…</p>';

  const ids = Array.isArray(b.transaction_ids) ? b.transaction_ids : [];
  if(ids.length === 0){ body.innerHTML = '<p class="meta" style="padding:12px 0">This batch has no claim lines recorded.</p>'; return; }

  const { data: txns, error } = await sb.from('transactions').select('*').in('id', ids);
  if(error){ body.innerHTML = '<p class="meta" style="padding:12px 0;color:var(--reject)">Could not load claims: ' + explain(error) + '</p>'; return; }

  // receipts (non-fatal if it fails)
  let docMap = {};
  const { data: docs } = await sb.from('documents').select('transaction_id, file_url').in('transaction_id', ids);
  (docs || []).forEach(d => { docMap[d.transaction_id] = d.file_url; });

  let rowsHtml = (txns || []).map(t => `
    <tr>
      <td>${fmtDate(t.claim_date)}</td>
      <td><div class="vendor">${t.vendor || '—'}</div><div class="desc">${t.description || ''}</div></td>
      <td>${t.category || '—'}</td>
      <td>${docMap[t.id] ? `<a class="receipt" href="${docMap[t.id]}" target="_blank" rel="noopener">View receipt</a>` : '<span class="desc">No receipt</span>'}</td>
      <td class="r num">${money(t.amount)}</td>
    </tr>`).join('');

  const decided = (b.status || '').toLowerCase().includes('approve') || (b.status || '').toLowerCase().includes('reject');

  let footer;
  if(decided){
    const by = userMap[b.approved_by_manager_id] || '—';
    footer = `<div class="decided">Decision: <b style="text-transform:capitalize">${b.status}</b> on ${fmtDate(b.approved_date)} by ${by}.`
      + (b.rejection_remarks ? `<br>Remarks: ${b.rejection_remarks}` : '') + `</div>`;
  } else {
    footer = `<div class="actions">
        <button class="btn btn-approve" onclick="decide(${b.id},'approve')">Approve batch</button>
        <button class="btn btn-reject" onclick="decide(${b.id},'reject')">Reject…</button>
      </div>`;
  }

  body.innerHTML = `
    <table>
      <thead><tr><th>Date</th><th>Vendor / detail</th><th>Category</th><th>Receipt</th><th class="r">Amount</th></tr></thead>
      <tbody>${rowsHtml}</tbody>
    </table>${footer}`;
}

// ---- Approve / Reject ----
async function decide(batchId, action){
  const managerId = $('#manager').value;
  if(!managerId){ alert('Please pick your name in "Reviewing as" (top right) before deciding.'); return; }

  let update;
  if(action === 'approve'){
    update = { status:'approved', approved_date:new Date().toISOString(), approved_by_manager_id:Number(managerId) };
  } else {
    const remarks = prompt('Reason for rejection (the employee will see this):');
    if(remarks === null) return; // cancelled
    update = { status:'rejected', approved_date:new Date().toISOString(), approved_by_manager_id:Number(managerId), rejection_remarks:remarks };
  }

  setStatus('<span class="spinner"></span>Saving decision…', 'info');
  const { error } = await sb.from('batches').update(update).eq('id', batchId);
  if(error){
    setStatus('<b>Could not save the decision.</b><br>' + explain(error)
      + '<br><span style="font-size:13px">(Reads can work while writes are blocked — that is still Row Level Security, just on the write side.)</span>', 'err');
    return;
  }
  setStatus('Decision saved.', 'info');
  setTimeout(() => setStatus(''), 1800);
  await loadBatches();
}

// ---- Boot ----
(async function init(){
  try{
    await loadUsers();
    await loadBatches();
  }catch(e){
    setStatus('<b>Something went wrong starting up.</b><br>' + explain(e), 'err');
  }
})();
</script>
</body>
</html>
